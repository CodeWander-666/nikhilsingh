<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Room</title>
    <style>
        .contact-panel {
            font-family: 'Inter', sans-serif;
            background: rgba(20,25,35,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #ffaa00;
            border-radius: 16px;
            padding: 32px;
            color: white;
            width: 300px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: 0.2s;
        }
        .contact-panel:hover {
            border-color: #ffaa00;
            box-shadow: 0 30px 50px rgba(0,0,0,0.8), 0 0 20px #ffaa00;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .title {
            font-size: 2rem;
            color: #ffaa00;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .contact-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .contact-link {
            color: #5a9eff;
            text-decoration: none;
            border: 1px solid #5a9eff;
            padding: 10px 24px;
            border-radius: 40px;
            transition: 0.2s;
        }
        .contact-link:hover {
            background: #5a9eff;
            color: black;
        }
        .sub {
            color: #aaa;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<!-- ROOM_CONTENT -->
<div class="contact-panel">
    <div class="icon">📬</div>
    <div class="title">CONNECT</div>
    <div class="contact-links">
        <a href="https://linkedin.com/in/nikhil-singh" target="_blank" class="contact-link">LinkedIn</a>
        <a href="https://github.com/wander-666" target="_blank" class="contact-link">GitHub</a>
    </div>
    <div class="sub">direct messages open</div>
</div>
<!-- /ROOM_CONTENT -->
</body>
</html>
