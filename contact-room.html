<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            touch-action: none;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            border: 1px solid #5a9eff;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #5a9eff;
            box-shadow: 0 0 50px #5a9eff;
            text-align: center;
            z-index: 200;
            backdrop-filter: blur(10px);
            transition: opacity 0.5s;
        }
        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff8888;
            background: rgba(30,0,0,0.95);
            padding: 30px;
            border: 2px solid #ff5555;
            border-radius: 12px;
            z-index: 300;
            display: none;
            max-width: 80%;
            text-align: center;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.9);
            border-radius: 50%;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 0 15px #5a9eff;
        }
        #file-input {
            display: none;
        }
        @media (max-width: 768px) {
            #crosshair { width: 16px; height: 16px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading">
        <div style="font-size:28px; margin-bottom:16px;">🚪 LOADING ROOM</div>
        <div id="progress-bar" style="width:0%; height:6px; background:#5a9eff; margin-top:20px; border-radius:3px;"></div>
    </div>
    <div id="error"></div>
    <div id="info">📍 SKILLS ROOM · Free camera · Zoom & orbit · Double‑click surface to upload · Press E to return</div>
    <div id="crosshair"></div>
    <input type="file" id="file-input" accept="image/*">

    <!-- Three.js and dependencies -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- UI Elements ---
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const infoDiv = document.getElementById('info');
        const fileInput = document.getElementById('file-input');
        const progressBar = document.getElementById('progress-bar');

        function showError(msg) {
            console.error(msg);
            if (errorDiv) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'ERROR: ' + msg;
            }
            if (loadingDiv) loadingDiv.style.display = 'none';
        }

        // --- IndexedDB for persistent storage ---
        let db;
        const DB_NAME = 'WallImagesDB';
        const STORE_NAME = 'images';

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve();
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'wallName' });
                    }
                };
            });
        }

        async function saveImageToDB(wallName, imageDataUrl) {
            if (!db) await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.put({ wallName, imageDataUrl });
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function loadImagesFromDB() {
            if (!db) await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        try {
            // --- SCENE ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);

            // --- CAMERA ---
            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(15, 10, 25); // start inside

            // --- RENDERER ---
            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.5;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // --- CSS2 RENDERER (for door label) ---
            const labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);

            // --- REALISTIC LIGHTING ---
            const ambient = new THREE.AmbientLight(0x404060, 0.6);
            scene.add(ambient);

            // Main key light (warm)
            const keyLight = new THREE.DirectionalLight(0xffeedd, 1.0);
            keyLight.position.set(8, 15, 8);
            keyLight.castShadow = true;
            keyLight.receiveShadow = true;
            keyLight.shadow.mapSize.width = 4096;
            keyLight.shadow.mapSize.height = 4096;
            keyLight.shadow.camera.near = 1;
            keyLight.shadow.camera.far = 60;
            keyLight.shadow.camera.left = -25;
            keyLight.shadow.camera.right = 25;
            keyLight.shadow.camera.top = 25;
            keyLight.shadow.camera.bottom = -25;
            scene.add(keyLight);

            // Fill light (cool)
            const fillLight = new THREE.DirectionalLight(0xaaccff, 0.7);
            fillLight.position.set(-10, 8, -12);
            scene.add(fillLight);

            // Back light
            const backLight = new THREE.DirectionalLight(0xffffff, 0.4);
            backLight.position.set(0, 5, 20);
            scene.add(backLight);

            // Additional point lights for depth
            const cornerLight1 = new THREE.PointLight(0x446688, 0.5, 40);
            cornerLight1.position.set(-25, 5, -25);
            scene.add(cornerLight1);
            const cornerLight2 = new THREE.PointLight(0x886644, 0.5, 40);
            cornerLight2.position.set(25, 5, 25);
            scene.add(cornerLight2);

            // --- ROOM DIMENSIONS ---
            const roomWidth = 60;
            const roomDepth = 60;
            const roomHeight = 20;
            const roomCenter = new THREE.Vector3(0, roomHeight/2, 0);

            // Camera bounds (keep camera strictly inside)
            const cameraMargin = 0.5;
            const bounds = {
                minX: -roomWidth/2 + cameraMargin,
                maxX: roomWidth/2 - cameraMargin,
                minY: cameraMargin,
                maxY: roomHeight - cameraMargin,
                minZ: -roomDepth/2 + cameraMargin,
                maxZ: roomDepth/2 - cameraMargin
            };

            // --- ORBIT CONTROLS (target at room center) ---
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.maxPolarAngle = Math.PI;
            controls.minDistance = 1;
            controls.maxDistance = 100;
            controls.target.copy(roomCenter);
            controls.update();

            // --- ENHANCED WALL MATERIALS (procedural textures for realism) ---
            function createWallTexture(baseColor) {
                const canvas = document.createElement('canvas');
                canvas.width = 1024;
                canvas.height = 1024;
                const ctx = canvas.getContext('2d');
                
                // Base color
                ctx.fillStyle = baseColor;
                ctx.fillRect(0, 0, 1024, 1024);
                
                // Fine noise for concrete/plaster effect
                const imageData = ctx.getImageData(0, 0, 1024, 1024);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    // Slight random variation
                    const noise = Math.random() * 20 - 10;
                    data[i] = Math.min(255, Math.max(0, data[i] + noise));
                    data[i+1] = Math.min(255, Math.max(0, data[i+1] + noise));
                    data[i+2] = Math.min(255, Math.max(0, data[i+2] + noise));
                }
                ctx.putImageData(imageData, 0, 0);
                
                // Add subtle horizontal lines (like panel seams)
                ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                ctx.lineWidth = 2;
                for (let y = 0; y < 1024; y += 128) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(1024, y);
                    ctx.stroke();
                }
                
                const texture = new THREE.CanvasTexture(canvas);
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(2, 2); // tile twice across the wall
                return texture;
            }

            function createNormalMap() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#8080ff'; // flat normal (pointing out)
                ctx.fillRect(0, 0, 512, 512);
                
                // Add some random variation
                const imageData = ctx.getImageData(0, 0, 512, 512);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    // Slight perturbation
                    data[i] = 128 + (Math.random() * 20 - 10);   // R
                    data[i+1] = 128 + (Math.random() * 20 - 10); // G
                    data[i+2] = 255; // B (height)
                }
                ctx.putImageData(imageData, 0, 0);
                
                const normalTex = new THREE.CanvasTexture(canvas);
                normalTex.wrapS = THREE.RepeatWrapping;
                normalTex.wrapT = THREE.RepeatWrapping;
                normalTex.repeat.set(2, 2);
                return normalTex;
            }

            const wallNormalMap = createNormalMap();

            // Distinct wall colors (subtle variations)
            const wallColors = {
                back: 0x5a7a9a, // muted blue
                front: 0x9a5a5a, // muted red
                left: 0x5a9a5a,  // muted green
                right: 0x9a8a5a, // muted gold
                ceiling: 0x7a7a8a // gray
            };

            function createWall(name, width, height, pos, rot, colorHex) {
                const geometry = new THREE.PlaneGeometry(width, height);
                const color = new THREE.Color(colorHex);
                const map = createWallTexture('#' + color.getHexString());
                const material = new THREE.MeshStandardMaterial({
                    map: map,
                    normalMap: wallNormalMap,
                    roughness: 0.7,
                    metalness: 0.1,
                    emissive: 0x000000
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(pos.x, pos.y, pos.z);
                mesh.rotation.set(rot.x, rot.y, rot.z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.userData = { name, width, height };
                scene.add(mesh);
                return mesh;
            }

            // Floor with refined grid texture
            const gridCanvas = document.createElement('canvas');
            gridCanvas.width = 2048;
            gridCanvas.height = 2048;
            const ctx = gridCanvas.getContext('2d');
            ctx.fillStyle = '#1a1a2a';
            ctx.fillRect(0, 0, 2048, 2048);
            ctx.strokeStyle = '#5a9eff';
            ctx.lineWidth = 8;
            for (let i = 0; i <= 2048; i += 256) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, 2048);
                ctx.strokeStyle = '#3a4a6a';
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(2048, i);
                ctx.stroke();
            }
            ctx.strokeStyle = '#5a9eff';
            ctx.lineWidth = 12;
            ctx.beginPath(); ctx.moveTo(1024, 0); ctx.lineTo(1024, 2048); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, 1024); ctx.lineTo(2048, 1024); ctx.stroke();
            const gridTexture = new THREE.CanvasTexture(gridCanvas);

            const floorMat = new THREE.MeshStandardMaterial({ map: gridTexture, roughness: 0.5, metalness: 0.2 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomDepth), floorMat);
            floor.rotation.x = -Math.PI/2;
            floor.position.y = 0;
            floor.receiveShadow = true;
            floor.userData = { name: 'floor', width: roomWidth, height: roomDepth };
            scene.add(floor);

            // Ceiling (simple)
            const ceilingMat = new THREE.MeshStandardMaterial({ color: wallColors.ceiling, roughness: 0.8 });
            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomDepth), ceilingMat);
            ceiling.rotation.x = Math.PI/2;
            ceiling.position.y = roomHeight;
            ceiling.receiveShadow = true;
            ceiling.userData = { name: 'ceiling', width: roomWidth, height: roomDepth };
            scene.add(ceiling);

            // Walls
            createWall('back', roomWidth, roomHeight,
                { x: 0, y: roomHeight/2, z: roomDepth/2 }, { x: 0, y: Math.PI, z: 0 }, wallColors.back);
            createWall('front', roomWidth, roomHeight,
                { x: 0, y: roomHeight/2, z: -roomDepth/2 }, { x: 0, y: 0, z: 0 }, wallColors.front);
            createWall('left', roomDepth, roomHeight,
                { x: -roomWidth/2, y: roomHeight/2, z: 0 }, { x: 0, y: Math.PI/2, z: 0 }, wallColors.left);
            createWall('right', roomDepth, roomHeight,
                { x: roomWidth/2, y: roomHeight/2, z: 0 }, { x: 0, y: -Math.PI/2, z: 0 }, wallColors.right);

            // --- RETURN DOOR (decorative only) ---
            function createDoor() {
                const doorGroup = new THREE.Group();
                const frameMat = new THREE.MeshStandardMaterial({ color: 0x8b6b4d, roughness: 0.7 });
                const leftPost = new THREE.Mesh(new THREE.BoxGeometry(0.2, 2.2, 0.2), frameMat);
                leftPost.position.set(-1, 1.1, 0);
                doorGroup.add(leftPost);
                const rightPost = new THREE.Mesh(new THREE.BoxGeometry(0.2, 2.2, 0.2), frameMat);
                rightPost.position.set(1, 1.1, 0);
                doorGroup.add(rightPost);
                const topBeam = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.2, 0.2), frameMat);
                topBeam.position.set(0, 2.2, 0);
                doorGroup.add(topBeam);

                const doorMat = new THREE.MeshStandardMaterial({ color: 0x5a9eff, roughness: 0.5, metalness: 0.1 });
                const doorLeaf = new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.0, 0.1), doorMat);
                doorLeaf.position.set(0, 1.0, 0.05);
                doorLeaf.castShadow = true;
                doorLeaf.receiveShadow = true;
                doorGroup.add(doorLeaf);

                const handleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.8 });
                const handleBar = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4, 8), handleMat);
                handleBar.rotation.z = Math.PI/2;
                handleBar.position.set(0.6, 1.0, 0.15);
                doorGroup.add(handleBar);
                const handleKnob = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8), handleMat);
                handleKnob.position.set(0.8, 1.0, 0.15);
                doorGroup.add(handleKnob);

                const labelDiv = document.createElement('div');
                labelDiv.style.color = 'white';
                labelDiv.style.background = 'rgba(0,0,0,0.8)';
                labelDiv.style.padding = '6px 16px';
                labelDiv.style.borderRadius = '20px';
                labelDiv.style.border = '1px solid #5a9eff';
                labelDiv.style.fontSize = '16px';
                labelDiv.style.fontWeight = 'bold';
                labelDiv.style.backdropFilter = 'blur(4px)';
                labelDiv.innerText = 'PRESS E TO RETURN';
                const labelObj = new CSS2DObject(labelDiv);
                labelObj.position.set(0, 3.0, 0);
                doorGroup.add(labelObj);

                return doorGroup;
            }

            const door = createDoor();
            door.position.set(0, 0.5, roomDepth/2 - 0.5);
            door.rotation.y = 0;
            scene.add(door);

            // --- PERSISTENT STORAGE SETUP ---
            await openDB().catch(err => console.warn('IndexedDB open failed, uploads will not persist', err));

            // --- WALL INTERACTION (image upload) ---
            const wallMeshes = scene.children.filter(obj => obj.isMesh && obj.userData.name);
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const WALL_PASSWORD = '1234';
            let pendingWall = null;

            function enhanceImage(img) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                const w = canvas.width, h = canvas.height;
                const output = ctx.createImageData(w, h);
                const outData = output.data;

                const kernel = [0, -1, 0, -1, 5, -1, 0, -1, 0];
                for (let y = 1; y < h-1; y++) {
                    for (let x = 1; x < w-1; x++) {
                        let r=0,g=0,b=0;
                        for (let ky = -1; ky <=1; ky++) {
                            for (let kx = -1; kx <=1; kx++) {
                                const px = x + kx;
                                const py = y + ky;
                                const idx = (py * w + px) * 4;
                                const weight = kernel[(ky+1)*3 + (kx+1)];
                                r += data[idx] * weight;
                                g += data[idx+1] * weight;
                                b += data[idx+2] * weight;
                            }
                        }
                        const idxOut = (y * w + x) * 4;
                        outData[idxOut] = Math.min(255, Math.max(0, r));
                        outData[idxOut+1] = Math.min(255, Math.max(0, g));
                        outData[idxOut+2] = Math.min(255, Math.max(0, b));
                        outData[idxOut+3] = data[idxOut+3];
                    }
                }
                // Copy edges
                for (let i = 0; i < w*h; i++) {
                    if (i < w || i >= (h-1)*w || i % w === 0 || i % w === w-1) {
                        const idx = i*4;
                        outData[idx] = data[idx];
                        outData[idx+1] = data[idx+1];
                        outData[idx+2] = data[idx+2];
                        outData[idx+3] = data[idx+3];
                    }
                }
                // Contrast boost
                for (let i = 0; i < outData.length; i+=4) {
                    outData[i] = Math.min(255, outData[i] * 1.05);
                    outData[i+1] = Math.min(255, outData[i+1] * 1.05);
                    outData[i+2] = Math.min(255, outData[i+2] * 1.05);
                }
                ctx.putImageData(output, 0, 0);

                const tex = new THREE.CanvasTexture(canvas);
                tex.minFilter = THREE.LinearMipmapLinearFilter;
                tex.magFilter = THREE.LinearFilter;
                tex.anisotropy = 16;
                tex.wrapS = THREE.ClampToEdgeWrapping;
                tex.wrapT = THREE.ClampToEdgeWrapping;
                return { tex, dataUrl: canvas.toDataURL() };
            }

            function applyTextureToSurface(mesh, tex, imgAspect, imageDataUrl) {
                if (!mesh || !tex) return false;

                if (mesh.material.map) mesh.material.map.dispose();

                const newMaterial = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    roughness: 0.4,
                    metalness: 0.0,
                    map: tex
                });

                const w = mesh.userData.width;
                const h = mesh.userData.height;
                const surfaceAspect = w / h;

                let repeatX, repeatY, offsetX, offsetY;

                if (imgAspect > surfaceAspect) {
                    repeatX = 1;
                    repeatY = surfaceAspect / imgAspect;
                    offsetX = 0;
                    offsetY = (1 - repeatY) / 2;
                } else {
                    repeatX = imgAspect / surfaceAspect;
                    repeatY = 1;
                    offsetX = (1 - repeatX) / 2;
                    offsetY = 0;
                }

                tex.repeat.set(repeatX, repeatY);
                tex.offset.set(offsetX, offsetY);
                tex.needsUpdate = true;

                newMaterial.map = tex;
                mesh.material = newMaterial;

                if (imageDataUrl) {
                    saveImageToDB(mesh.userData.name, imageDataUrl).catch(err => console.warn('Failed to save image', err));
                }
                return true;
            }

            // Load saved images on startup
            (async () => {
                try {
                    const savedImages = await loadImagesFromDB();
                    for (const { wallName, imageDataUrl } of savedImages) {
                        const wall = wallMeshes.find(m => m.userData.name === wallName);
                        if (!wall) continue;
                        const img = new Image();
                        img.onload = () => {
                            const tex = enhanceImage(img).tex;
                            applyTextureToSurface(wall, tex, img.width / img.height);
                        };
                        img.src = imageDataUrl;
                    }
                } catch (err) {
                    console.warn('Could not load saved images', err);
                }
            })();

            renderer.domElement.addEventListener('dblclick', (e) => {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(wallMeshes);

                if (intersects.length > 0) {
                    const wall = intersects[0].object;
                    const password = prompt('Enter admin password:');
                    if (password === WALL_PASSWORD) {
                        pendingWall = wall;
                        fileInput.click();
                    } else {
                        alert('Incorrect password.');
                    }
                }
            });

            fileInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (!file || !pendingWall) return;

                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const { tex, dataUrl } = enhanceImage(img);
                        applyTextureToSurface(pendingWall, tex, img.width / img.height, dataUrl);
                        infoDiv.innerHTML = `✅ Image applied to ${pendingWall.userData.name} wall`;
                        pendingWall = null;
                        fileInput.value = '';
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });

            // Hide loading after a short delay
            setTimeout(() => {
                if (loadingDiv) {
                    loadingDiv.style.opacity = '0';
                    setTimeout(() => { loadingDiv.style.display = 'none'; }, 500);
                }
            }, 1000);

            // --- UNIVERSAL E KEY TO RETURN TO HUB (no proximity check) ---
            window.addEventListener('keydown', (e) => {
                if (e.code === 'KeyE') {
                    window.location.href = 'index.html';
                }
            });

            // --- ANIMATION LOOP with camera clamping ---
            function animate() {
                requestAnimationFrame(animate);
                controls.update();

                const pos = camera.position;
                pos.x = Math.max(bounds.minX, Math.min(bounds.maxX, pos.x));
                pos.y = Math.max(bounds.minY, Math.min(bounds.maxY, pos.y));
                pos.z = Math.max(bounds.minZ, Math.min(bounds.maxZ, pos.z));

                renderer.render(scene, camera);
                labelRenderer.render(scene, camera);
            }
            animate();

            // --- RESIZE ---
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                labelRenderer.setSize(window.innerWidth, window.innerHeight);
            });

        } catch (err) {
            showError(err.message);
        }
    </script>
</body>
</html>
