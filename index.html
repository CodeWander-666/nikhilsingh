<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIKHIL SINGH · DREAM HUB · PREMIUM</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            touch-action: none;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            border: 1px solid #5a9eff;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #5a9eff;
            box-shadow: 0 0 50px #5a9eff;
            text-align: center;
            z-index: 200;
            backdrop-filter: blur(10px);
            transition: opacity 0.5s;
        }
        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff8888;
            background: rgba(30,0,0,0.95);
            padding: 30px;
            border: 2px solid #ff5555;
            border-radius: 12px;
            z-index: 300;
            display: none;
            max-width: 80%;
            text-align: center;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.9);
            border-radius: 50%;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 0 15px #5a9eff;
        }
        #door-prompt {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            border: 2px solid #5a9eff;
            font-size: 18px;
            font-weight: bold;
            z-index: 200;
            display: none;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }
        @media (max-width: 768px) {
            #crosshair { width: 16px; height: 16px; }
            #door-prompt { font-size: 16px; bottom: 80px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading">
        <div style="font-size:28px; margin-bottom:16px;">🚪 LOADING DREAM HUB</div>
        <div id="progress-bar" style="width:0%; height:6px; background:#5a9eff; margin-top:20px; border-radius:3px;"></div>
    </div>
    <div id="error"></div>
    <div id="info">📍 DREAM HUB · WASD move · Space jump · Approach door & press E to enter</div>
    <div id="crosshair"></div>
    <div id="door-prompt">PRESS E TO ENTER</div>

    <!-- Three.js and dependencies -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- UI Elements ---
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const infoDiv = document.getElementById('info');
        const doorPrompt = document.getElementById('door-prompt');
        const progressBar = document.getElementById('progress-bar');

        function showError(msg) {
            console.error(msg);
            if (errorDiv) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'ERROR: ' + msg;
            }
            if (loadingDiv) loadingDiv.style.display = 'none';
        }

        try {
            // --- SCENE ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.FogExp2(0x0a0a1a, 0.002);

            // --- CAMERA ---
            const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 2, 5); // start on central platform

            // --- RENDERER ---
            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // --- POST-PROCESSING (Bloom) ---
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0, 0, 0);
            bloomPass.threshold = 0.0;
            bloomPass.strength = 0.0;
            bloomPass.radius = 0.0;

            const composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // --- CSS2 RENDERER (for door labels) ---
            const labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);

            // --- LIGHTING (rich, dynamic) ---
            const ambient = new THREE.AmbientLight(0x404060, 0.8);
            scene.add(ambient);

            // Key light (warm)
            const keyLight = new THREE.DirectionalLight(0xffeedd, 1.2);
            keyLight.position.set(5, 15, 10);
            keyLight.castShadow = true;
            keyLight.receiveShadow = true;
            keyLight.shadow.mapSize.width = 4096;
            keyLight.shadow.mapSize.height = 4096;
            keyLight.shadow.camera.near = 1;
            keyLight.shadow.camera.far = 50;
            keyLight.shadow.camera.left = -20;
            keyLight.shadow.camera.right = 20;
            keyLight.shadow.camera.top = 20;
            keyLight.shadow.camera.bottom = -20;
            scene.add(keyLight);

            // Fill light (cool)
            const fillLight = new THREE.DirectionalLight(0xaaccff, 0.8);
            fillLight.position.set(-8, 8, -8);
            scene.add(fillLight);

            // Back light
            const backLight = new THREE.DirectionalLight(0xffffff, 0.5);
            backLight.position.set(0, 5, -15);
            scene.add(backLight);

            // Moving point lights for atmosphere
            const movingLight1 = new THREE.PointLight(0x5a9eff, 0.6, 30);
            scene.add(movingLight1);
            const movingLight2 = new THREE.PointLight(0xffaa88, 0.6, 30);
            scene.add(movingLight2);

            // --- CENTRAL PLATFORM (with glowing edges) ---
            const platformGroup = new THREE.Group();

            // Base
            const platformGeo = new THREE.CylinderGeometry(4, 4, 0.5, 64);
            const platformMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.4, metalness: 0.3, emissive: 0x111122 });
            const platform = new THREE.Mesh(platformGeo, platformMat);
            platform.position.y = -0.25;
            platform.receiveShadow = true;
            platform.castShadow = true;
            platformGroup.add(platform);

            // Glowing ring
            const ringGeo = new THREE.TorusGeometry(4.2, 0.1, 16, 64);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0x5a9eff, emissive: 0x5a9eff });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI/2;
            ring.position.y = 0.1;
            platformGroup.add(ring);

            // Inner glow discs
            const discGeo = new THREE.CylinderGeometry(3.8, 3.8, 0.1, 32);
            const discMat = new THREE.MeshStandardMaterial({ color: 0x111122, emissive: 0x224466 });
            const disc = new THREE.Mesh(discGeo, discMat);
            disc.position.y = 0.2;
            platformGroup.add(disc);

            scene.add(platformGroup);

            // --- SURROUNDING ISLANDS WITH DOORS ---
            const islandRadius = 7;
            const doorPositions = [
                { angle: 0, label: 'SKILLS', room: 'skills', color: 0x4a6fa5 },
                { angle: Math.PI/2, label: 'PROJECTS', room: 'projects', color: 0xb24c4c },
                { angle: Math.PI, label: 'EXPERIENCE', room: 'experience', color: 0x4ca64c },
                { angle: 3*Math.PI/2, label: 'CONTACT', room: 'contact', color: 0xd4a14a }
            ];

            const doors = []; // for proximity detection

            // Create a fancy door with frame, leaf, handle, and CSS2D label
            function createDoor(color, label, roomName) {
                const doorGroup = new THREE.Group();

                // Frame (dark metal)
                const frameMat = new THREE.MeshStandardMaterial({ color: 0x5a5a6a, roughness: 0.4, metalness: 0.7 });
                const leftPost = new THREE.Mesh(new THREE.BoxGeometry(0.2, 2.2, 0.2), frameMat);
                leftPost.position.set(-1, 1.1, 0);
                doorGroup.add(leftPost);
                const rightPost = new THREE.Mesh(new THREE.BoxGeometry(0.2, 2.2, 0.2), frameMat);
                rightPost.position.set(1, 1.1, 0);
                doorGroup.add(rightPost);
                const topBeam = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.2, 0.2), frameMat);
                topBeam.position.set(0, 2.2, 0);
                doorGroup.add(topBeam);

                // Door leaf (colored, emissive)
                const doorMat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.3 });
                const doorLeaf = new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.0, 0.1), doorMat);
                doorLeaf.position.set(0, 1.0, 0.05);
                doorLeaf.castShadow = true;
                doorLeaf.receiveShadow = true;
                doorGroup.add(doorLeaf);

                // Handle
                const handleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.8 });
                const handleBar = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4, 8), handleMat);
                handleBar.rotation.z = Math.PI/2;
                handleBar.position.set(0.6, 1.0, 0.15);
                doorGroup.add(handleBar);
                const handleKnob = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8), handleMat);
                handleKnob.position.set(0.8, 1.0, 0.15);
                doorGroup.add(handleKnob);

                // CSS2 label above door
                const labelDiv = document.createElement('div');
                labelDiv.style.color = 'white';
                labelDiv.style.background = 'rgba(0,0,0,0.7)';
                labelDiv.style.padding = '6px 16px';
                labelDiv.style.borderRadius = '20px';
                labelDiv.style.border = '1px solid ' + new THREE.Color(color).getStyle();
                labelDiv.style.fontSize = '16px';
                labelDiv.style.fontWeight = 'bold';
                labelDiv.style.backdropFilter = 'blur(4px)';
                labelDiv.innerText = label;
                const labelObj = new CSS2DObject(labelDiv);
                labelObj.position.set(0, 3.0, 0);
                doorGroup.add(labelObj);

                doorGroup.userData = { type: 'door', room: roomName };
                return doorGroup;
            }

            doorPositions.forEach(pos => {
                // Island base
                const islandGeo = new THREE.CylinderGeometry(2.5, 3, 0.8, 32);
                const islandMat = new THREE.MeshStandardMaterial({ color: 0x3a4a5a, roughness: 0.6, emissive: 0x112233 });
                const island = new THREE.Mesh(islandGeo, islandMat);
                island.position.set(Math.cos(pos.angle)*islandRadius, -0.4, Math.sin(pos.angle)*islandRadius);
                island.receiveShadow = true;
                island.castShadow = true;
                scene.add(island);

                // Door
                const door = createDoor(pos.color, pos.label, pos.room);
                door.position.set(Math.cos(pos.angle)*islandRadius, 0.5, Math.sin(pos.angle)*islandRadius);
                door.rotation.y = -pos.angle; // face inward
                scene.add(door);
                doors.push(door);
            });

            // --- DECORATIVE PILLARS (on central platform) ---
            for (let i = 0; i < 8; i++) {
                const angle = (i/8)*Math.PI*2;
                const radius = 3.5;
                const pillarGeo = new THREE.CylinderGeometry(0.3, 0.4, 2, 8);
                const pillarMat = new THREE.MeshStandardMaterial({ color: 0x6a7a8a, emissive: 0x112233 });
                const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                pillar.position.set(Math.cos(angle)*radius, 1, Math.sin(angle)*radius);
                pillar.castShadow = true;
                pillar.receiveShadow = true;
                scene.add(pillar);
            }

            // --- FLOATING PARTICLES (ambient) ---
            const particleCount = 1500;
            const particlesGeo = new THREE.BufferGeometry();
            const particlesPos = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                particlesPos[i*3] = (Math.random() - 0.5) * 50;
                particlesPos[i*3+1] = (Math.random() - 0.5) * 20;
                particlesPos[i*3+2] = (Math.random() - 0.5) * 50;
            }
            particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlesPos, 3));
            const particlesMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.1, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(particlesGeo, particlesMat);
            scene.add(particles);

            // --- SKY DOME (simple gradient via fog, but we can add a starfield) ---
            // (already have fog)

            // --- PLAYER PHYSICS (first-person) ---
            const controls = new PointerLockControls(camera, document.body);
            scene.add(controls.getObject());

            renderer.domElement.addEventListener('click', () => {
                if (!controls.isLocked) controls.lock();
            });

            const player = {
                velocity: new THREE.Vector3(),
                onGround: false,
                speed: 8,
                jumpSpeed: 6,
                gravity: 25,
                damp: 0.8,
                radius: 0.5,
                height: 2.0
            };

            // Bounds: stay on central platform and islands (simple cylindrical bounds)
            // We'll approximate by allowing movement within a circle of radius ~8
            const maxDist = 9; // can go to islands
            const minY = 1.0;  // platform height

            // --- KEYBOARD INPUT ---
            const keyState = { w: false, a: false, s: false, d: false, space: false };
            window.addEventListener('keydown', (e) => {
                switch(e.code) {
                    case 'KeyW': keyState.w = true; e.preventDefault(); break;
                    case 'KeyA': keyState.a = true; e.preventDefault(); break;
                    case 'KeyS': keyState.s = true; e.preventDefault(); break;
                    case 'KeyD': keyState.d = true; e.preventDefault(); break;
                    case 'Space': keyState.space = true; e.preventDefault(); break;
                }
            });
            window.addEventListener('keyup', (e) => {
                switch(e.code) {
                    case 'KeyW': keyState.w = false; e.preventDefault(); break;
                    case 'KeyA': keyState.a = false; e.preventDefault(); break;
                    case 'KeyS': keyState.s = false; e.preventDefault(); break;
                    case 'KeyD': keyState.d = false; e.preventDefault(); break;
                    case 'Space': keyState.space = false; e.preventDefault(); break;
                }
            });

            // --- DOOR INTERACTION (E key) ---
            let currentDoor = null;
            window.addEventListener('keydown', (e) => {
                if (e.code === 'KeyE' && currentDoor) {
                    const room = currentDoor.userData.room;
                    window.location.href = `${room}-room.html`; // e.g., skills-room.html
                }
            });

            // --- PHYSICS UPDATE ---
            function updatePlayer(delta) {
                if (!controls.isLocked) return;

                const playerPos = controls.getObject().position;

                // Get camera direction (horizontal)
                const cameraDir = new THREE.Vector3();
                camera.getWorldDirection(cameraDir);
                cameraDir.y = 0;
                cameraDir.normalize();
                const cameraRight = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), cameraDir).normalize();

                const moveDir = new THREE.Vector3(0, 0, 0);
                if (keyState.w) moveDir.add(cameraDir);
                if (keyState.s) moveDir.sub(cameraDir);
                if (keyState.a) moveDir.add(cameraRight);
                if (keyState.d) moveDir.sub(cameraRight);

                if (moveDir.lengthSq() > 0) {
                    moveDir.normalize();
                    player.velocity.x = moveDir.x * player.speed;
                    player.velocity.z = moveDir.z * player.speed;
                } else {
                    player.velocity.x *= player.damp;
                    player.velocity.z *= player.damp;
                }

                // Gravity
                player.velocity.y -= player.gravity * delta;

                // Ground check (platform at y=1)
                if (playerPos.y <= 1.0 && player.velocity.y < 0) {
                    player.velocity.y = 0;
                    playerPos.y = 1.0;
                    player.onGround = true;
                    if (keyState.space) {
                        player.velocity.y = player.jumpSpeed;
                        player.onGround = false;
                    }
                } else {
                    player.onGround = false;
                }

                // Apply velocity
                playerPos.x += player.velocity.x * delta;
                playerPos.y += player.velocity.y * delta;
                playerPos.z += player.velocity.z * delta;

                // Constrain to circular area (hub)
                const dist = Math.sqrt(playerPos.x*playerPos.x + playerPos.z*playerPos.z);
                if (dist > maxDist) {
                    const angle = Math.atan2(playerPos.z, playerPos.x);
                    playerPos.x = Math.cos(angle) * maxDist;
                    playerPos.z = Math.sin(angle) * maxDist;
                }

                if (playerPos.y < 1.0) playerPos.y = 1.0;
            }

            // --- PROXIMITY DETECTION (for doors) ---
            function checkDoors() {
                if (!controls.isLocked) return;

                const playerPos = controls.getObject().position;
                let closestDoor = null;
                let minDist = 3.0;

                doors.forEach(door => {
                    const dist = playerPos.distanceTo(door.position);
                    if (dist < minDist) {
                        minDist = dist;
                        closestDoor = door;
                    }
                });

                if (closestDoor !== currentDoor) {
                    // Reset previous door glow
                    if (currentDoor) {
                        currentDoor.children.forEach(child => {
                            if (child.material && child.material.emissive) {
                                child.material.emissive.setHex(currentDoor.userData.originalEmissive || 0);
                            }
                        });
                    }
                    currentDoor = closestDoor;
                    if (currentDoor) {
                        // Store original emissive
                        currentDoor.children.forEach(child => {
                            if (child.material && child.material.emissive) {
                                if (currentDoor.userData.originalEmissive === undefined) {
                                    currentDoor.userData.originalEmissive = child.material.emissive.getHex();
                                }
                                child.material.emissive.setHex(0x5a9eff);
                            }
                        });
                        doorPrompt.style.display = 'block';
                    } else {
                        doorPrompt.style.display = 'none';
                    }
                }
            }

            // --- ANIMATION LOOP ---
            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                const delta = Math.min(clock.getDelta(), 0.1);

                // Animate moving lights
                const time = performance.now() / 1000;
                movingLight1.position.x = Math.sin(time * 0.5) * 8;
                movingLight1.position.z = Math.cos(time * 0.7) * 8;
                movingLight2.position.x = Math.sin(time * 0.8 + 2) * 8;
                movingLight2.position.z = Math.cos(time * 0.6 + 1) * 8;

                // Rotate central platform slowly
                platformGroup.rotation.y += 0.002;

                // Rotate particles
                particles.rotation.y += 0.0002;

                updatePlayer(delta);
                checkDoors();

                composer.render();
                labelRenderer.render(scene, camera);
            }
            animate();

            // --- RESIZE ---
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
                labelRenderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Hide loading
            setTimeout(() => {
                if (loadingDiv) {
                    loadingDiv.style.opacity = '0';
                    setTimeout(() => { loadingDiv.style.display = 'none'; }, 500);
                }
            }, 1500);

        } catch (err) {
            showError(err.message);
        }
    </script>
</body>
</html>
