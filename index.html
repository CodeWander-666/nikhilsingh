<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIKHIL SINGH · DREAM WALK · 50+ WIDGETS</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
        #info {
            position: absolute; bottom: 20px; left: 20px; color: #00f3ff;
            text-shadow: 0 0 10px #00f3ff; font-size: 14px; z-index: 100;
            background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px;
            pointer-events: none;
        }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 24px; z-index: 200;
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 8px;
            border: 1px solid #00f3ff;
            transition: opacity 0.5s;
        }
        #error {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff5555; background: black; padding: 20px; border: 2px solid red;
            z-index: 300; display: none; max-width: 80%; text-align: center;
        }
        #progress-bar {
            width: 0%; height: 4px; background: #00f3ff; margin-top: 10px;
            transition: width 0.3s;
        }
        #fps {
            position: absolute; top: 20px; right: 20px; color: #00f3ff;
            font-size: 12px; background: rgba(0,0,0,0.5); padding: 4px 8px;
            border-radius: 4px; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div>INITIALIZING DREAM WALK... <span id="load-status">0%</span></div>
        <div id="progress-bar" style="width:0%"></div>
    </div>
    <div id="error"></div>
    <div id="info">WASD MOVE | MOUSE LOOK | 50+ DATA NODES</div>
    <div id="fps">FPS: --</div>

    <!-- Three.js core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Required shaders for bloom -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <!-- Post-processing -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <!-- CSS2 Renderer -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <!-- Controls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        (function() {
            "use strict";

            // --- FETCH & EXECUTE HELPER ---
            async function fetchAndExecuteScript(url, globalVarName) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status} - ${response.statusText}`);
                    const html = await response.text();
                    const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/i);
                    if (!scriptMatch || !scriptMatch[1]) throw new Error(`No <script> tag found in ${url}`);
                    const scriptContent = scriptMatch[1];
                    const func = new Function(scriptContent);
                    func.call(window);
                    if (globalVarName && !window[globalVarName]) {
                        console.warn(`Global variable ${globalVarName} not set after executing ${url}`);
                    }
                } catch (error) {
                    console.error(`Failed to load ${url}:`, error);
                    throw error;
                }
            }

            // --- UI ELEMENTS ---
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const progressBar = document.getElementById('progress-bar');
            const loadStatus = document.getElementById('load-status');
            const fpsSpan = document.getElementById('fps');

            function setProgress(percent, msg) {
                progressBar.style.width = percent + '%';
                if (msg) loadStatus.innerText = msg;
            }

            function showError(msg) {
                console.error(msg);
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'ERROR: ' + msg;
                loadingDiv.style.opacity = '0';
                setTimeout(() => { loadingDiv.style.display = 'none'; }, 500);
            }

            // --- LOADING SEQUENCE ---
            async function loadAll() {
                try {
                    setProgress(10, 'Fetching data...');
                    await fetchAndExecuteScript('data.html', 'PORTFOLIO_DATA');
                    setProgress(50, 'Loading widgets...');
                    await fetchAndExecuteScript('widgets.html', 'Widgets');
                    setProgress(80, 'Verifying...');

                    if (!window.PORTFOLIO_DATA) throw new Error('PORTFOLIO_DATA missing');
                    if (!window.Widgets) throw new Error('Widgets missing');

                    setProgress(100, 'Ready!');
                    loadingDiv.style.opacity = '0';
                    setTimeout(() => {
                        loadingDiv.style.display = 'none';
                        initThree();
                    }, 500);
                } catch (error) {
                    showError(error.message);
                }
            }

            loadAll();

            // --- FPS COUNTER ---
            let frameCount = 0;
            let lastTime = performance.now();
            function updateFPS() {
                frameCount++;
                const now = performance.now();
                const delta = now - lastTime;
                if (delta >= 1000) {
                    const fps = Math.round((frameCount * 1000) / delta);
                    fpsSpan.innerText = `FPS: ${fps}`;
                    frameCount = 0;
                    lastTime = now;
                }
            }

            // --- THREE.JS INIT ---
            function initThree() {
                try {
                    // --- SETUP ---
                    const scene = new THREE.Scene();
                    scene.background = new THREE.Color(0x050510);
                    scene.fog = new THREE.FogExp2(0x050510, 0.002);

                    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                    camera.position.set(0, 2, 10);

                    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                    renderer.toneMapping = THREE.ReinhardToneMapping;
                    renderer.toneMappingExposure = 1.2;
                    document.body.appendChild(renderer.domElement);

                    const labelRenderer = new THREE.CSS2DRenderer();
                    labelRenderer.setSize(window.innerWidth, window.innerHeight);
                    labelRenderer.domElement.style.position = 'absolute';
                    labelRenderer.domElement.style.top = '0px';
                    labelRenderer.domElement.style.left = '0px';
                    labelRenderer.domElement.style.pointerEvents = 'none';
                    document.body.appendChild(labelRenderer.domElement);

                    const controls = new THREE.PointerLockControls(camera, document.body);
                    scene.add(controls.getObject());

                    renderer.domElement.addEventListener('click', () => {
                        if (!controls.isLocked) controls.lock();
                    });

                    // --- POST-PROCESSING (BLOOM) ---
                    const renderScene = new THREE.RenderPass(scene, camera);
                    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
                    bloomPass.threshold = 0.1;
                    bloomPass.strength = 1.5;
                    bloomPass.radius = 0.5;

                    const composer = new THREE.EffectComposer(renderer);
                    composer.addPass(renderScene);
                    composer.addPass(bloomPass);

                    // --- LIGHTING ---
                    const ambient = new THREE.AmbientLight(0x404060);
                    scene.add(ambient);

                    const light1 = new THREE.PointLight(0x00f3ff, 1, 30);
                    light1.position.set(5, 5, 5);
                    scene.add(light1);

                    const light2 = new THREE.PointLight(0xff00aa, 0.8, 30);
                    light2.position.set(-5, 3, -5);
                    scene.add(light2);

                    const flickerLight = new THREE.PointLight(0xffffff, 0.5, 20);
                    flickerLight.position.set(0, 4, 0);
                    scene.add(flickerLight);

                    // --- ENVIRONMENT: FLOATING ISLANDS (3) ---
                    function createFloatingIsland(pos, color = 0x223344) {
                        const group = new THREE.Group();
                        const base = new THREE.Mesh(
                            new THREE.CylinderGeometry(2, 2.5, 0.5, 8),
                            new THREE.MeshStandardMaterial({ color, emissive: 0x112233, roughness: 0.4 })
                        );
                        base.position.y = 0;
                        group.add(base);

                        const pillar = new THREE.Mesh(
                            new THREE.CylinderGeometry(0.5, 0.5, 2, 6),
                            new THREE.MeshStandardMaterial({ color: 0x8899aa, emissive: 0x112233 })
                        );
                        pillar.position.y = 1.25;
                        group.add(pillar);

                        const top = new THREE.Mesh(
                            new THREE.TorusKnotGeometry(1, 0.3, 64, 8),
                            new THREE.MeshStandardMaterial({ color: 0x00f3ff, emissive: 0x004466 })
                        );
                        top.position.y = 2.5;
                        group.add(top);

                        group.position.copy(pos);
                        return group;
                    }

                    scene.add(createFloatingIsland(new THREE.Vector3(0, 0, 0)));
                    scene.add(createFloatingIsland(new THREE.Vector3(12, 3, -8)));
                    scene.add(createFloatingIsland(new THREE.Vector3(-10, -1, 7)));

                    // --- PARTICLES (2000) ---
                    const particleCount = 2000;
                    const particlesGeo = new THREE.BufferGeometry();
                    const particlesPos = new Float32Array(particleCount * 3);
                    for (let i = 0; i < particleCount; i++) {
                        particlesPos[i*3] = (Math.random() - 0.5) * 80;
                        particlesPos[i*3+1] = (Math.random() - 0.5) * 40;
                        particlesPos[i*3+2] = (Math.random() - 0.5) * 80;
                    }
                    particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlesPos, 3));
                    const particlesMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.05, transparent: true, opacity: 0.4 });
                    const particles = new THREE.Points(particlesGeo, particlesMat);
                    scene.add(particles);

                    // --- INTERACTIVE OBJECTS (50+ WIDGETS) ---
                    const interactiveObjects = [];

                    // Helper to create a floating node with a widget and complex motion
                    function createDataNode(widget, pos, motionType = 'orbit') {
                        // Create a small glowing sphere as the node
                        const geom = new THREE.SphereGeometry(0.3, 8);
                        const mat = new THREE.MeshStandardMaterial({ color: 0x00f3ff, emissive: 0x004466 });
                        const sphere = new THREE.Mesh(geom, mat);
                        sphere.position.copy(pos);
                        sphere.userData = { widget, motionType, timeOffset: Math.random() * 100, speed: 0.5 + Math.random() * 0.5 };
                        scene.add(sphere);

                        // Position widget above sphere
                        widget.position.copy(pos.clone().add(new THREE.Vector3(0, 1.2, 0)));
                        scene.add(widget);

                        sphere.userData.widget = widget;
                        interactiveObjects.push(sphere);
                        return sphere;
                    }

                    // Generate 50+ nodes using portfolio data and random fragments
                    const nodes = [];

                    // 1. Skill crystals (5)
                    PORTFOLIO_DATA.skills.forEach((skill, i) => {
                        const angle = (i / PORTFOLIO_DATA.skills.length) * Math.PI * 2;
                        const radius = 5;
                        const pos = new THREE.Vector3(Math.cos(angle) * radius, 1.5, Math.sin(angle) * radius);
                        const widget = window.Widgets.createSkillWidget(skill);
                        const node = createDataNode(widget, pos, 'orbit');
                        nodes.push(node);
                    });

                    // 2. Project portals (2)
                    PORTFOLIO_DATA.projects.forEach((proj, i) => {
                        const pos = new THREE.Vector3( (i === 0 ? 6 : -6), 2.5, 4 );
                        const widget = window.Widgets.createProjectWidget(proj);
                        const node = createDataNode(widget, pos, 'bob');
                        nodes.push(node);
                    });

                    // 3. Experience monoliths (2)
                    PORTFOLIO_DATA.experience.forEach((exp, i) => {
                        const pos = new THREE.Vector3( -3 + i*6, 1, -5 );
                        const widget = window.Widgets.createExperienceWidget(exp);
                        const node = createDataNode(widget, pos, 'bob');
                        nodes.push(node);
                    });

                    // 4. Contact beacon (1)
                    const contactPos = new THREE.Vector3(0, 1.2, 7);
                    const contactWidget = window.Widgets.createContactWidget(PORTFOLIO_DATA.socials);
                    const contactNode = createDataNode(contactWidget, contactPos, 'pulse');
                    nodes.push(contactNode);

                    // 5. Generate 45 knowledge fragments (to reach 50+)
                    for (let i = 0; i < 45; i++) {
                        // Random position within a large spherical shell
                        const r = 8 + Math.random() * 6;
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        const x = r * Math.sin(phi) * Math.cos(theta);
                        const y = r * Math.sin(phi) * Math.sin(theta) * 0.5 + 2; // flatten a bit
                        const z = r * Math.cos(phi);
                        const pos = new THREE.Vector3(x, y, z);

                        const widget = window.Widgets.createKnowledgeFragment(i);
                        // Choose motion type: orbit, spiral, or random drift
                        const motionType = ['orbit', 'spiral', 'drift'][Math.floor(Math.random() * 3)];
                        const node = createDataNode(widget, pos, motionType);
                        // Store additional motion parameters
                        node.userData.orbitCenter = new THREE.Vector3(0, 2, 0);
                        node.userData.orbitRadius = r;
                        node.userData.orbitSpeed = 0.2 + Math.random() * 0.3;
                        node.userData.orbitAngle = Math.random() * Math.PI * 2;
                        node.userData.driftVec = new THREE.Vector3(
                            (Math.random() - 0.5) * 0.02,
                            (Math.random() - 0.5) * 0.02,
                            (Math.random() - 0.5) * 0.02
                        );
                        nodes.push(node);
                    }

                    console.log(`Total nodes created: ${nodes.length}`); // Should be 5+2+2+1+45 = 55

                    // --- RAYCASTER ---
                    const raycaster = new THREE.Raycaster();
                    const mouse = new THREE.Vector2();
                    let hoveredObj = null;

                    window.addEventListener('mousemove', (e) => {
                        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                    });

                    function checkInteraction() {
                        if (!controls.isLocked) return;
                        raycaster.setFromCamera(mouse, camera);
                        const intersects = raycaster.intersectObjects(interactiveObjects);
                        if (intersects.length > 0) {
                            const hit = intersects[0].object;
                            if (hoveredObj !== hit) {
                                if (hoveredObj) {
                                    hoveredObj.material.emissive.setHex(hoveredObj.userData.originalEmissive || 0x004466);
                                    if (hoveredObj.userData.widget) {
                                        hoveredObj.userData.widget.element.style.transform = 'scale(1)';
                                    }
                                }
                                hoveredObj = hit;
                                if (!hit.userData.originalEmissive) {
                                    hit.userData.originalEmissive = hit.material.emissive.getHex();
                                }
                                hit.material.emissive.setHex(0x00f3ff);
                                if (hit.userData.widget) {
                                    hit.userData.widget.element.style.transform = 'scale(1.1)';
                                }
                            }
                        } else {
                            if (hoveredObj) {
                                hoveredObj.material.emissive.setHex(hoveredObj.userData.originalEmissive || 0x004466);
                                if (hoveredObj.userData.widget) {
                                    hoveredObj.userData.widget.element.style.transform = 'scale(1)';
                                }
                                hoveredObj = null;
                            }
                        }
                    }

                    // --- MOVEMENT ---
                    const moveState = { forward: false, backward: false, left: false, right: false };
                    document.addEventListener('keydown', (e) => {
                        switch(e.code) {
                            case 'KeyW': moveState.forward = true; break;
                            case 'KeyS': moveState.backward = true; break;
                            case 'KeyA': moveState.left = true; break;
                            case 'KeyD': moveState.right = true; break;
                        }
                    });
                    document.addEventListener('keyup', (e) => {
                        switch(e.code) {
                            case 'KeyW': moveState.forward = false; break;
                            case 'KeyS': moveState.backward = false; break;
                            case 'KeyA': moveState.left = false; break;
                            case 'KeyD': moveState.right = false; break;
                        }
                    });

                    function updateMovement(delta) {
                        if (!controls.isLocked) return;
                        const speed = 8 * delta;
                        const cameraDir = new THREE.Vector3();
                        camera.getWorldDirection(cameraDir);
                        cameraDir.y = 0;
                        cameraDir.normalize();
                        const strafeDir = new THREE.Vector3().crossVectors(cameraDir, new THREE.Vector3(0,1,0)).normalize();
                        if (moveState.forward) controls.getObject().position.addScaledVector(cameraDir, speed);
                        if (moveState.backward) controls.getObject().position.addScaledVector(cameraDir, -speed);
                        if (moveState.left) controls.getObject().position.addScaledVector(strafeDir, -speed);
                        if (moveState.right) controls.getObject().position.addScaledVector(strafeDir, speed);
                    }

                    // --- ANIMATION LOOP ---
                    function animate() {
                        requestAnimationFrame(animate);
                        const delta = clock.getDelta();
                        updateFPS();

                        // Move nodes based on motion type
                        const time = performance.now() / 1000;
                        nodes.forEach(node => {
                            const data = node.userData;
                            let newPos = node.position.clone();
                            switch (data.motionType) {
                                case 'orbit':
                                    // Orbit around center with varying radius
                                    if (data.orbitCenter) {
                                        const angle = time * data.orbitSpeed + data.timeOffset;
                                        newPos.x = data.orbitCenter.x + Math.cos(angle) * data.orbitRadius;
                                        newPos.z = data.orbitCenter.z + Math.sin(angle) * data.orbitRadius;
                                        newPos.y = data.orbitCenter.y + Math.sin(angle * 2) * 1.5;
                                    }
                                    break;
                                case 'spiral':
                                    newPos.x += Math.sin(time * 2 + data.timeOffset) * 0.05;
                                    newPos.y += Math.cos(time * 1.5 + data.timeOffset) * 0.05;
                                    newPos.z += Math.sin(time * 1.8 + data.timeOffset) * 0.05;
                                    break;
                                case 'drift':
                                    newPos.add(data.driftVec);
                                    // Wrap around if too far
                                    if (newPos.length() > 25) {
                                        newPos.copy(new THREE.Vector3(0,2,0));
                                    }
                                    break;
                                case 'bob':
                                    newPos.y += Math.sin(time * 2 + data.timeOffset) * 0.03;
                                    break;
                                case 'pulse':
                                    // pulse size
                                    node.scale.setScalar(1 + Math.sin(time * 5) * 0.1);
                                    break;
                                default:
                                    break;
                            }
                            node.position.copy(newPos);
                            // Update widget position
                            if (data.widget) {
                                data.widget.position.copy(newPos.clone().add(new THREE.Vector3(0, 1.2, 0)));
                            }
                        });

                        // Flicker light
                        if (flickerLight) {
                            flickerLight.intensity = 0.4 + Math.sin(time * 8) * 0.2;
                        }

                        updateMovement(delta);
                        checkInteraction();

                        composer.render();
                        labelRenderer.render(scene, camera);
                    }

                    const clock = new THREE.Clock();
                    animate();

                    // --- RESIZE ---
                    window.addEventListener('resize', () => {
                        camera.aspect = window.innerWidth / window.innerHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(window.innerWidth, window.innerHeight);
                        labelRenderer.setSize(window.innerWidth, window.innerHeight);
                        composer.setSize(window.innerWidth, window.innerHeight);
                    });

                    // Mobile hint
                    if (/Mobi|Android/i.test(navigator.userAgent)) {
                        document.getElementById('info').innerHTML = 'DRAG TO LOOK | TAP TO LOCK | 50+ NODES';
                    }
                } catch (e) {
                    showError("3D initialization failed: " + e.message);
                }
            }
        })();
    </script>
</body>
</html>
