<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIKHIL SINGH · PORTFOLIO</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            touch-action: none;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            border: 1px solid #5a9eff;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #5a9eff;
            box-shadow: 0 0 50px #5a9eff;
            text-align: center;
            z-index: 200;
            backdrop-filter: blur(10px);
            transition: opacity 0.5s;
        }
        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff8888;
            background: rgba(30,0,0,0.95);
            padding: 30px;
            border: 2px solid #ff5555;
            border-radius: 12px;
            z-index: 300;
            display: none;
            max-width: 80%;
            text-align: center;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.9);
            border-radius: 50%;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 0 15px #5a9eff;
        }
        #door-prompt {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            border: 2px solid #5a9eff;
            font-size: 18px;
            font-weight: bold;
            z-index: 200;
            display: none;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }
        #click-hint {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #5a9eff;
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #5a9eff;
            font-size: 16px;
            z-index: 250;
            backdrop-filter: blur(5px);
            pointer-events: none;
            transition: opacity 0.5s;
        }
        #joystick {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(30,30,40,0.8);
            border: 2px solid #5a9eff;
            box-shadow: 0 0 20px #5a9eff;
            display: none;
            z-index: 300;
            backdrop-filter: blur(8px);
            touch-action: none;
        }
        #joystick-thumb {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #5a9eff;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 15px #5a9eff;
        }
        #mobile-e {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(90,158,255,0.9);
            border: 3px solid white;
            color: white;
            font-size: 36px;
            font-weight: bold;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 30px #5a9eff;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        @media (max-width: 768px) {
            #crosshair { width: 16px; height: 16px; }
            #door-prompt { font-size: 16px; bottom: 140px; }
            #click-hint { display: none; }
            #joystick { display: block; }
            #mobile-e { display: flex; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading">
        <div style="font-size:28px; margin-bottom:16px;">🚪 LOADING DREAM HUB</div>
        <div id="progress-bar" style="width:0%; height:6px; background:#5a9eff; margin-top:20px; border-radius:3px;"></div>
    </div>
    <div id="error"></div>
    <div id="click-hint">👆 CLICK TO LOCK · WASD MOVE · SPACE JUMP</div>
    <div id="info">📍 DREAM HUB · Approach door & press E to enter</div>
    <div id="crosshair"></div>
    <div id="door-prompt">PRESS E TO ENTER</div>
    <div id="joystick"><div id="joystick-thumb"></div></div>
    <div id="mobile-e">E</div>

    <!-- Three.js and dependencies -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- UI Elements ---
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const infoDiv = document.getElementById('info');
        const doorPrompt = document.getElementById('door-prompt');
        const clickHint = document.getElementById('click-hint');
        const progressBar = document.getElementById('progress-bar');
        const joystickDiv = document.getElementById('joystick');
        const joystickThumb = document.getElementById('joystick-thumb');
        const mobileE = document.getElementById('mobile-e');

        function showError(msg) {
            console.error(msg);
            if (errorDiv) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'ERROR: ' + msg;
            }
            if (loadingDiv) loadingDiv.style.display = 'none';
        }

        try {
            // --- Check for PointerLock support ---
            if (!('pointerLockElement' in document) && !('mozPointerLockElement' in document)) {
                throw new Error('Your browser does not support Pointer Lock. Please use a modern browser.');
            }

            // --- SCENE ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.FogExp2(0x0a0a1a, 0.002);

            // --- CAMERA ---
            const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 2, 5);

            // --- RENDERER ---
            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // --- CSS2 RENDERER (for door labels) ---
            const labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);

            // --- LIGHTING (rich, dynamic) ---
            const ambient = new THREE.AmbientLight(0x404060, 0.5);
            scene.add(ambient);

            const keyLight = new THREE.DirectionalLight(0xffeedd, 1.2);
            keyLight.position.set(5, 15, 10);
            keyLight.castShadow = true;
            keyLight.receiveShadow = true;
            keyLight.shadow.mapSize.width = 4096;
            keyLight.shadow.mapSize.height = 4096;
            keyLight.shadow.camera.near = 1;
            keyLight.shadow.camera.far = 50;
            keyLight.shadow.camera.left = -20;
            keyLight.shadow.camera.right = 20;
            keyLight.shadow.camera.top = 20;
            keyLight.shadow.camera.bottom = -20;
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0xaaccff, 0.8);
            fillLight.position.set(-8, 8, -8);
            scene.add(fillLight);

            const backLight = new THREE.DirectionalLight(0xffffff, 0.5);
            backLight.position.set(0, 5, -15);
            scene.add(backLight);

            // Colored point lights
            const pointLight1 = new THREE.PointLight(0x5a9eff, 0.8, 30);
            pointLight1.position.set(4, 3, 4);
            scene.add(pointLight1);
            const pointLight2 = new THREE.PointLight(0xffaa88, 0.6, 30);
            pointLight2.position.set(-4, 3, -4);
            scene.add(pointLight2);

            const movingLight1 = new THREE.PointLight(0x5a9eff, 0.6, 30);
            scene.add(movingLight1);
            const movingLight2 = new THREE.PointLight(0xffaa88, 0.6, 30);
            scene.add(movingLight2);

            // --- CENTRAL PLATFORM (base) ---
            const platformGroup = new THREE.Group();

            const platformGeo = new THREE.CylinderGeometry(5, 5, 0.5, 64);
            const platformMat = new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.3, metalness: 0.5 });
            const platform = new THREE.Mesh(platformGeo, platformMat);
            platform.position.y = -0.25;
            platform.receiveShadow = true;
            platform.castShadow = true;
            platformGroup.add(platform);

            const ringGeo = new THREE.TorusGeometry(5.2, 0.1, 16, 64);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0x5a9eff, roughness: 0.2, metalness: 0.8 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI/2;
            ring.position.y = 0.1;
            platformGroup.add(ring);

            scene.add(platformGroup);

            // --- NEON HACKING TERMINALS (no scientists) ---
            const terminalPositions = [
                { x: 2.5, z: 1.5, angle: 0 },
                { x: -2.5, z: 1.5, angle: 0 },
                { x: 2.5, z: -1.5, angle: Math.PI },
                { x: -2.5, z: -1.5, angle: Math.PI }
            ];

            // Create a scrolling code texture with neon green/cyan
            function createHackTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                
                let offset = 0;
                const colors = ['#0f0', '#0ff', '#5a9eff', '#afa'];
                
                const texture = new THREE.CanvasTexture(canvas);
                
                function update() {
                    ctx.fillStyle = '#0a0a1a';
                    ctx.fillRect(0, 0, 512, 512);
                    
                    ctx.font = '16px monospace';
                    
                    // Random code lines
                    const lines = [];
                    for (let i = 0; i < 25; i++) {
                        const hex = Math.random().toString(16).substring(2, 8);
                        const num = Math.floor(Math.random() * 1000);
                        const line = `0x${hex} = ${num} | ${Math.random().toString(36).substring(2, 6)}`;
                        lines.push(line);
                    }
                    
                    offset = (offset + 2) % 512; // faster scroll
                    
                    for (let i = 0; i < lines.length; i++) {
                        const y = (i * 22 + offset) % 512 - 22;
                        // Random neon color
                        ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                        ctx.fillText(lines[i], 20, y);
                    }
                    
                    texture.needsUpdate = true;
                }
                
                return { texture, update };
            }

            const hackScreens = [];

            terminalPositions.forEach((pos, index) => {
                // Desk (sleek black)
                const deskGeo = new THREE.BoxGeometry(1.5, 0.2, 1.5);
                const deskMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.3, metalness: 0.6 });
                const desk = new THREE.Mesh(deskGeo, deskMat);
                desk.position.set(pos.x, 0.6, pos.z);
                desk.castShadow = true;
                desk.receiveShadow = true;
                scene.add(desk);

                // Monitor screen with neon code
                const codeSource = createHackTexture();
                const screenGeo = new THREE.BoxGeometry(0.9, 0.7, 0.1);
                const screenMat = new THREE.MeshStandardMaterial({ 
                    map: codeSource.texture, 
                    emissive: 0x224466,
                    emissiveIntensity: 0.8
                });
                const screen = new THREE.Mesh(screenGeo, screenMat);
                screen.position.set(pos.x, 1.1, pos.z + (index < 2 ? 0.3 : -0.3));
                screen.rotation.y = pos.angle;
                screen.castShadow = true;
                scene.add(screen);
                
                hackScreens.push({ update: codeSource.update });

                // Monitor frame (thin black border)
                const frameGeo = new THREE.BoxGeometry(0.95, 0.75, 0.05);
                const frameMat = new THREE.MeshStandardMaterial({ color: 0x222233, emissive: 0x111122 });
                const frame = new THREE.Mesh(frameGeo, frameMat);
                frame.position.copy(screen.position);
                frame.rotation.copy(screen.rotation);
                scene.add(frame);

                // Keyboard (simple block)
                const keyboardGeo = new THREE.BoxGeometry(0.8, 0.1, 0.3);
                const keyboardMat = new THREE.MeshStandardMaterial({ color: 0x333344 });
                const keyboard = new THREE.Mesh(keyboardGeo, keyboardMat);
                keyboard.position.set(pos.x, 0.75, pos.z + (index < 2 ? 0.5 : -0.5));
                keyboard.rotation.y = pos.angle;
                keyboard.castShadow = true;
                keyboard.receiveShadow = true;
                scene.add(keyboard);
            });

            // --- SURROUNDING ISLANDS WITH DOORS (4 doors) ---
            const islandRadius = 7;
            const doorPositions = [
                { angle: 0, label: 'SKILLS', room: 'skills', color: 0x4a6fa5 },
                { angle: Math.PI/2, label: 'PROJECTS', room: 'projects', color: 0xb24c4c },
                { angle: Math.PI, label: 'EXPERIENCE', room: 'experience', color: 0x4ca64c },
                { angle: 3*Math.PI/2, label: 'CONTACT', room: 'contact', color: 0xd4a14a }
            ];

            const doors = [];

            function createDoor(color, label, roomName) {
                const doorGroup = new THREE.Group();

                const frameMat = new THREE.MeshStandardMaterial({ color: 0x5a5a6a, roughness: 0.4, metalness: 0.7 });
                const leftPost = new THREE.Mesh(new THREE.BoxGeometry(0.2, 2.2, 0.2), frameMat);
                leftPost.position.set(-1, 1.1, 0);
                doorGroup.add(leftPost);
                const rightPost = new THREE.Mesh(new THREE.BoxGeometry(0.2, 2.2, 0.2), frameMat);
                rightPost.position.set(1, 1.1, 0);
                doorGroup.add(rightPost);
                const topBeam = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.2, 0.2), frameMat);
                topBeam.position.set(0, 2.2, 0);
                doorGroup.add(topBeam);

                const doorMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.3 });
                const doorLeaf = new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.0, 0.1), doorMat);
                doorLeaf.position.set(0, 1.0, 0.05);
                doorLeaf.castShadow = true;
                doorLeaf.receiveShadow = true;
                doorGroup.add(doorLeaf);

                const handleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.8 });
                const handleBar = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4, 8), handleMat);
                handleBar.rotation.z = Math.PI/2;
                handleBar.position.set(0.6, 1.0, 0.15);
                doorGroup.add(handleBar);
                const handleKnob = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8), handleMat);
                handleKnob.position.set(0.8, 1.0, 0.15);
                doorGroup.add(handleKnob);

                const labelDiv = document.createElement('div');
                labelDiv.style.color = 'white';
                labelDiv.style.background = 'rgba(0,0,0,0.7)';
                labelDiv.style.padding = '6px 16px';
                labelDiv.style.borderRadius = '20px';
                labelDiv.style.border = '1px solid ' + new THREE.Color(color).getStyle();
                labelDiv.style.fontSize = '16px';
                labelDiv.style.fontWeight = 'bold';
                labelDiv.style.backdropFilter = 'blur(4px)';
                labelDiv.innerText = label;
                const labelObj = new CSS2DObject(labelDiv);
                labelObj.position.set(0, 3.0, 0);
                doorGroup.add(labelObj);

                doorGroup.userData = { type: 'door', room: roomName, originalEmissive: null };
                return doorGroup;
            }

            doorPositions.forEach(pos => {
                const islandGeo = new THREE.CylinderGeometry(2.5, 3, 0.8, 32);
                const islandMat = new THREE.MeshStandardMaterial({ color: 0x3a4a5a, roughness: 0.6, metalness: 0.2 });
                const island = new THREE.Mesh(islandGeo, islandMat);
                island.position.set(Math.cos(pos.angle)*islandRadius, -0.4, Math.sin(pos.angle)*islandRadius);
                island.receiveShadow = true;
                island.castShadow = true;
                scene.add(island);

                const door = createDoor(pos.color, pos.label, pos.room);
                door.position.set(Math.cos(pos.angle)*islandRadius, 0.5, Math.sin(pos.angle)*islandRadius);
                door.rotation.y = -pos.angle;
                scene.add(door);
                doors.push(door);
            });

            // --- DECORATIVE PILLARS ---
            for (let i = 0; i < 8; i++) {
                const angle = (i/8)*Math.PI*2;
                const radius = 4.2;
                
                const baseGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.2, 8);
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x8a9aad, roughness: 0.4, metalness: 0.6 });
                const base = new THREE.Mesh(baseGeo, baseMat);
                base.position.set(Math.cos(angle)*radius, 0.1, Math.sin(angle)*radius);
                base.receiveShadow = true;
                base.castShadow = true;
                scene.add(base);

                const shaftGeo = new THREE.CylinderGeometry(0.3, 0.3, 2.0, 8);
                const shaftMat = new THREE.MeshStandardMaterial({ color: 0x5a6a7a, roughness: 0.3, metalness: 0.5 });
                const shaft = new THREE.Mesh(shaftGeo, shaftMat);
                shaft.position.set(Math.cos(angle)*radius, 1.1, Math.sin(angle)*radius);
                shaft.receiveShadow = true;
                shaft.castShadow = true;
                scene.add(shaft);

                const capitalGeo = new THREE.CylinderGeometry(0.5, 0.4, 0.3, 8);
                const capitalMat = new THREE.MeshStandardMaterial({ color: 0x9aabba, roughness: 0.3, metalness: 0.7 });
                const capital = new THREE.Mesh(capitalGeo, capitalMat);
                capital.position.set(Math.cos(angle)*radius, 2.3, Math.sin(angle)*radius);
                capital.receiveShadow = true;
                capital.castShadow = true;
                scene.add(capital);

                const orbGeo = new THREE.SphereGeometry(0.15, 8);
                const orbMat = new THREE.MeshStandardMaterial({ color: 0x5a9eff, emissive: 0x224466 });
                const orb = new THREE.Mesh(orbGeo, orbMat);
                orb.position.set(Math.cos(angle)*radius, 2.6, Math.sin(angle)*radius);
                orb.castShadow = true;
                scene.add(orb);
            }

            // --- FLOATING PARTICLES ---
            const particleCount = 2000;
            const particlesGeo = new THREE.BufferGeometry();
            const particlesPos = new Float32Array(particleCount * 3);
            const particlesColor = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                particlesPos[i*3] = (Math.random() - 0.5) * 60;
                particlesPos[i*3+1] = (Math.random() - 0.5) * 30;
                particlesPos[i*3+2] = (Math.random() - 0.5) * 60;

                const r = Math.random();
                if (r < 0.33) { particlesColor[i*3]=0.0; particlesColor[i*3+1]=1.0; particlesColor[i*3+2]=1.0; }
                else if (r < 0.66) { particlesColor[i*3]=1.0; particlesColor[i*3+1]=0.0; particlesColor[i*3+2]=1.0; }
                else { particlesColor[i*3]=1.0; particlesColor[i*3+1]=0.8; particlesColor[i*3+2]=0.0; }
            }
            particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlesPos, 3));
            particlesGeo.setAttribute('color', new THREE.BufferAttribute(particlesColor, 3));
            const particlesMat = new THREE.PointsMaterial({ size: 0.1, vertexColors: true, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(particlesGeo, particlesMat);
            scene.add(particles);

            // --- CONTROLS (desktop) ---
            const controls = new PointerLockControls(camera, document.body);
            scene.add(controls.getObject());

            renderer.domElement.addEventListener('click', () => {
                if (!controls.isLocked) {
                    controls.lock();
                    clickHint.style.opacity = '0';
                    setTimeout(() => clickHint.style.display = 'none', 500);
                }
            });

            // --- PLAYER PHYSICS ---
            const player = {
                velocity: new THREE.Vector3(),
                onGround: false,
                speed: 8,
                jumpSpeed: 6,
                gravity: 25,
                damp: 0.8,
                radius: 0.5,
                height: 2.0
            };

            const maxDist = 9;
            const minY = 1.0;

            const keyState = { w: false, a: false, s: false, d: false, space: false };

            window.addEventListener('keydown', (e) => {
                switch(e.code) {
                    case 'KeyW': keyState.w = true; e.preventDefault(); break;
                    case 'KeyA': keyState.a = true; e.preventDefault(); break;
                    case 'KeyS': keyState.s = true; e.preventDefault(); break;
                    case 'KeyD': keyState.d = true; e.preventDefault(); break;
                    case 'Space': keyState.space = true; e.preventDefault(); break;
                }
            });
            window.addEventListener('keyup', (e) => {
                switch(e.code) {
                    case 'KeyW': keyState.w = false; e.preventDefault(); break;
                    case 'KeyA': keyState.a = false; e.preventDefault(); break;
                    case 'KeyS': keyState.s = false; e.preventDefault(); break;
                    case 'KeyD': keyState.d = false; e.preventDefault(); break;
                    case 'Space': keyState.space = false; e.preventDefault(); break;
                }
            });

            // Mobile joystick
            let joystickActive = false;
            let joystickVec = { x: 0, y: 0 };
            if (window.innerWidth <= 768) {
                joystickDiv.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    joystickActive = true;
                    updateJoystick(e.touches[0]);
                });
                joystickDiv.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (joystickActive) updateJoystick(e.touches[0]);
                });
                joystickDiv.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    joystickActive = false;
                    joystickVec.x = 0;
                    joystickVec.y = 0;
                    joystickThumb.style.transform = 'translate(-50%, -50%)';
                });

                function updateJoystick(touch) {
                    const rect = joystickDiv.getBoundingClientRect();
                    const centerX = rect.left + rect.width/2;
                    const centerY = rect.top + rect.height/2;
                    const dx = touch.clientX - centerX;
                    const dy = touch.clientY - centerY;
                    const distance = Math.min(Math.sqrt(dx*dx + dy*dy), rect.width/2);
                    const angle = Math.atan2(dy, dx);
                    const limitedX = Math.cos(angle) * distance;
                    const limitedY = Math.sin(angle) * distance;
                    joystickVec.x = limitedX / (rect.width/2);
                    joystickVec.y = limitedY / (rect.height/2);
                    joystickThumb.style.transform = `translate(calc(-50% + ${limitedX}px), calc(-50% + ${limitedY}px))`;
                }
            }

            // Mobile E button
            mobileE.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (currentDoor) {
                    const room = currentDoor.userData.room;
                    const url = `${room}-room.html`;
                    console.log(`Mobile E: attempting to go to ${url}`);
                    fetch(url, { method: 'HEAD' })
                        .then(res => {
                            if (res.ok) {
                                window.location.href = url;
                            } else {
                                alert(`Room "${room}" not found. Please ensure ${url} exists.`);
                            }
                        })
                        .catch(() => alert(`Cannot access ${url}.`));
                } else {
                    console.warn('Mobile E: no currentDoor');
                }
            });

            // Door interaction (E key on desktop) – with extra logging
            let currentDoor = null;
            window.addEventListener('keydown', (e) => {
                if (e.code === 'KeyE') {
                    console.log('E pressed, currentDoor:', currentDoor);
                    if (currentDoor) {
                        const room = currentDoor.userData.room;
                        const url = `${room}-room.html`;
                        console.log(`Attempting to go to ${url}`);
                        fetch(url, { method: 'HEAD' })
                            .then(res => {
                                if (res.ok) {
                                    window.location.href = url;
                                } else {
                                    alert(`Room "${room}" not found. Please ensure ${url} exists.`);
                                }
                            })
                            .catch(() => alert(`Cannot access ${url}.`));
                    } else {
                        console.warn('E pressed but no door nearby');
                    }
                }
            });

            // --- PROXIMITY DETECTION (door glow) ---
            function checkDoors() {
                if (!controls.isLocked && !joystickActive) return;

                const playerPos = controls.getObject().position;
                let closestDoor = null;
                let minDist = 3.0;

                doors.forEach(door => {
                    const dist = playerPos.distanceTo(door.position);
                    if (dist < minDist) {
                        minDist = dist;
                        closestDoor = door;
                    }
                });

                if (closestDoor !== currentDoor) {
                    if (currentDoor) {
                        currentDoor.children.forEach(child => {
                            if (child.material && child.material.emissive) {
                                child.material.emissive.setHex(currentDoor.userData.originalEmissive || 0x000000);
                            }
                        });
                    }
                    currentDoor = closestDoor;
                    if (currentDoor) {
                        // Store original emissive if not stored
                        currentDoor.children.forEach(child => {
                            if (child.material && child.material.emissive) {
                                if (currentDoor.userData.originalEmissive === undefined) {
                                    currentDoor.userData.originalEmissive = child.material.emissive.getHex();
                                }
                                child.material.emissive.setHex(0x333333);
                            }
                        });
                        doorPrompt.style.display = 'block';
                        console.log('Now closest door:', currentDoor.userData.room);
                    } else {
                        doorPrompt.style.display = 'none';
                    }
                }
            }

            // --- PHYSICS UPDATE ---
            function updatePlayer(delta) {
                if (!controls.isLocked && !joystickActive) return;

                const playerPos = controls.getObject().position;

                const cameraDir = new THREE.Vector3();
                camera.getWorldDirection(cameraDir);
                cameraDir.y = 0;
                cameraDir.normalize();
                const cameraRight = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), cameraDir).normalize();

                const moveDir = new THREE.Vector3(0, 0, 0);
                if (keyState.w) moveDir.add(cameraDir);
                if (keyState.s) moveDir.sub(cameraDir);
                if (keyState.a) moveDir.add(cameraRight);
                if (keyState.d) moveDir.sub(cameraRight);

                if (joystickActive) {
                    const joyX = joystickVec.x;
                    const joyY = joystickVec.y;
                    moveDir.x += cameraDir.x * -joyY + cameraRight.x * joyX;
                    moveDir.z += cameraDir.z * -joyY + cameraRight.z * joyX;
                }

                if (moveDir.lengthSq() > 0) {
                    moveDir.normalize();
                    player.velocity.x = moveDir.x * player.speed;
                    player.velocity.z = moveDir.z * player.speed;
                } else {
                    player.velocity.x *= player.damp;
                    player.velocity.z *= player.damp;
                }

                player.velocity.y -= player.gravity * delta;

                if (playerPos.y <= 1.0 && player.velocity.y < 0) {
                    player.velocity.y = 0;
                    playerPos.y = 1.0;
                    player.onGround = true;
                    if (keyState.space) {
                        player.velocity.y = player.jumpSpeed;
                        player.onGround = false;
                    }
                } else {
                    player.onGround = false;
                }

                playerPos.x += player.velocity.x * delta;
                playerPos.y += player.velocity.y * delta;
                playerPos.z += player.velocity.z * delta;

                const dist = Math.sqrt(playerPos.x*playerPos.x + playerPos.z*playerPos.z);
                if (dist > maxDist) {
                    const angle = Math.atan2(playerPos.z, playerPos.x);
                    playerPos.x = Math.cos(angle) * maxDist;
                    playerPos.z = Math.sin(angle) * maxDist;
                }
                if (playerPos.y < 1.0) playerPos.y = 1.0;
            }

            // --- ANIMATION LOOP ---
            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                const delta = Math.min(clock.getDelta(), 0.1);
                const time = performance.now() / 1000;

                // Update moving lights
                movingLight1.position.x = Math.sin(time * 0.5) * 8;
                movingLight1.position.z = Math.cos(time * 0.7) * 8;
                movingLight2.position.x = Math.sin(time * 0.8 + 2) * 8;
                movingLight2.position.z = Math.cos(time * 0.6 + 1) * 8;

                // Rotate platform
                platformGroup.rotation.y += 0.001;

                // Update hack screens (scrolling code)
                hackScreens.forEach(s => s.update());

                // Rotate particles
                particles.rotation.y += 0.0002;

                updatePlayer(delta);
                checkDoors();

                renderer.render(scene, camera);
                labelRenderer.render(scene, camera);
            }
            animate();

            // --- RESIZE ---
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                labelRenderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Hide loading
            setTimeout(() => {
                if (loadingDiv) {
                    loadingDiv.style.opacity = '0';
                    setTimeout(() => { loadingDiv.style.display = 'none'; }, 500);
                }
            }, 1500);

        } catch (err) {
            showError(err.message);
        }
    </script>
</body>
</html>
