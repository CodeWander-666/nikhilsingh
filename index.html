<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIKHIL SINGH · DOORS OF DATA</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            touch-action: none;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ccc;
            background: rgba(20,20,30,0.8);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid #444;
            font-size: 14px;
            z-index: 100;
            transition: opacity 1s;
            pointer-events: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(10,10,20,0.95);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #555;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 200;
            backdrop-filter: blur(10px);
        }
        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff8888;
            background: rgba(30,0,0,0.95);
            padding: 30px;
            border: 2px solid #ff5555;
            border-radius: 12px;
            z-index: 300;
            display: none;
            max-width: 80%;
            text-align: center;
        }
        #progress-bar {
            width: 0%;
            height: 4px;
            background: #5a9eff;
            margin-top: 20px;
            border-radius: 2px;
            transition: width 0.3s;
        }
        #fps {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #aaa;
            background: rgba(20,20,30,0.6);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 100;
            backdrop-filter: blur(4px);
            border: 1px solid #333;
        }
        #joystick {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(30,30,40,0.7);
            border: 2px solid #888;
            display: none;
            z-index: 200;
            backdrop-filter: blur(8px);
            touch-action: none;
        }
        #joystick-thumb {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #aaa;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .hint {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 24px;
            border-radius: 40px;
            border: 1px solid #5a9eff;
            backdrop-filter: blur(5px);
            font-size: 16px;
            z-index: 150;
            transition: opacity 0.5s;
            pointer-events: none;
            white-space: nowrap;
        }
        @media (max-width: 768px) {
            .hint { font-size: 14px; padding: 8px 16px; }
            #joystick { display: block; }
        }
    </style>
    <!-- Load Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Three.js core & addons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
    <div id="loading">
        <div style="font-size:24px; margin-bottom:16px;">🚪 DOORS OF DATA</div>
        <div>LOADING <span id="load-status">0%</span></div>
        <div id="progress-bar" style="width:0%"></div>
    </div>
    <div id="error"></div>
    <div class="hint" id="tutorial">👆 CLICK TO LOCK · WASD TO MOVE · WALK TO A DOOR AND CLICK TO ENTER</div>
    <div id="info"></div>
    <div id="fps">FPS: --</div>
    <div id="joystick"><div id="joystick-thumb"></div></div>

    <script>
        (function() {
            "use strict";

            // --- Embedded Portfolio Data (same as before) ---
            const PORTFOLIO_DATA = {
                name: "NIKHIL SINGH",
                role: "DATA ANALYST // FULL STACK SCIENTIST",
                about: "Turning raw data into actionable intelligence.",
                skills: [
                    { name: "PYTHON", level: 95, color: "#FFD700", description: "Core language for Data Science." },
                    { name: "SQL", level: 90, color: "#00BFFF", description: "Expert in complex queries." },
                    { name: "GEN‑AI", level: 85, color: "#bc13fe", description: "LLM Integration, RAG Systems." },
                    { name: "MACHINE LEARNING", level: 80, color: "#FF4500", description: "Regression, classification." },
                    { name: "COMPUTER VISION", level: 75, color: "#20B2AA", description: "OpenCV, YOLO." }
                ],
                projects: [
                    { title: "SEOMAN AI", description: "Full‑stack AI SEO Analyzer with traffic forecasting.", link: "https://seoman-ai.vercel.app", color: "#00FF7F", tags: ["REACT", "AI"] },
                    { title: "NOVUSFACE AI", description: "Biometric Face Regeneration & Swapping Engine (free).", link: "#", color: "#FF1493", tags: ["GEN‑AI", "PYTHON"] }
                ],
                experience: [
                    { company: "ALMABETTER", role: "Data Analyst Apprentice", period: "2025 – Present", description: "Full Stack Data Science & AI program." },
                    { company: "SG GURUKUL", role: "Sales & Marketing Intern", period: "Aug 2023 – Oct 2023", description: "Lead generation, outbound telesales." }
                ],
                socials: {
                    linkedin: "https://linkedin.com/in/nikhil-singh",
                    github: "https://github.com/wander-666"
                }
            };

            // --- UI Elements ---
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const progressBar = document.getElementById('progress-bar');
            const loadStatus = document.getElementById('load-status');
            const fpsSpan = document.getElementById('fps');
            const tutorialDiv = document.getElementById('tutorial');
            const infoDiv = document.getElementById('info');

            function setProgress(percent, msg) {
                progressBar.style.width = percent + '%';
                if (msg) loadStatus.innerText = msg;
            }

            function showError(msg) {
                console.error(msg);
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'ERROR: ' + msg;
                loadingDiv.style.opacity = '0';
                setTimeout(() => { loadingDiv.style.display = 'none'; }, 500);
            }

            // --- Fetch and execute widgets.html ---
            async function loadWidgets() {
                try {
                    const response = await fetch('widgets.html');
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const html = await response.text();
                    const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/i);
                    if (!scriptMatch) throw new Error('No script tag in widgets.html');
                    const scriptContent = scriptMatch[1];
                    const func = new Function(scriptContent);
                    func.call(window);
                    if (!window.Widgets) throw new Error('Widgets not defined');
                    console.log('Widgets loaded successfully');
                } catch (e) {
                    console.error('Failed to load widgets:', e);
                    throw e;
                }
            }

            // --- Main initialization after widgets are ready ---
            async function start() {
                try {
                    setProgress(30, 'Loading widgets...');
                    await loadWidgets();
                    setProgress(60, 'Building world...');
                    // Simulate a bit of delay
                    setTimeout(() => {
                        setProgress(100, 'Ready!');
                        loadingDiv.style.opacity = '0';
                        setTimeout(() => {
                            loadingDiv.style.display = 'none';
                            initThree();
                        }, 500);
                    }, 400);
                } catch (e) {
                    showError('Failed to load widgets: ' + e.message);
                }
            }

            start();

            // --- FPS Counter ---
            let frameCount = 0;
            let lastTime = performance.now();
            function updateFPS() {
                frameCount++;
                const now = performance.now();
                const delta = now - lastTime;
                if (delta >= 1000) {
                    const fps = Math.round((frameCount * 1000) / delta);
                    fpsSpan.innerText = `FPS: ${fps}`;
                    frameCount = 0;
                    lastTime = now;
                }
            }

            // --- Mobile Joystick (simplified) ---
            let joystickActive = false;
            let joystickVector = { x: 0, y: 0 };
            const joystickDiv = document.getElementById('joystick');
            const joystickThumb = document.getElementById('joystick-thumb');
            if (window.innerWidth <= 768) {
                joystickDiv.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    joystickActive = true;
                    updateJoystick(e.touches[0]);
                });
                joystickDiv.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (joystickActive) updateJoystick(e.touches[0]);
                });
                joystickDiv.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    joystickActive = false;
                    joystickVector.x = 0;
                    joystickVector.y = 0;
                    joystickThumb.style.transform = 'translate(-50%, -50%)';
                });
                function updateJoystick(touch) {
                    const rect = joystickDiv.getBoundingClientRect();
                    const centerX = rect.left + rect.width/2;
                    const centerY = rect.top + rect.height/2;
                    const dx = touch.clientX - centerX;
                    const dy = touch.clientY - centerY;
                    const distance = Math.min(Math.sqrt(dx*dx+dy*dy), rect.width/2);
                    const angle = Math.atan2(dy, dx);
                    const limitedX = Math.cos(angle) * distance;
                    const limitedY = Math.sin(angle) * distance;
                    joystickVector.x = limitedX / (rect.width/2);
                    joystickVector.y = limitedY / (rect.height/2);
                    joystickThumb.style.transform = `translate(calc(-50% + ${limitedX}px), calc(-50% + ${limitedY}px))`;
                }
            }

            // --- THREE.JS INIT (adapted from previous version, using Widgets) ---
            function initThree() {
                try {
                    const scene = new THREE.Scene();
                    scene.background = new THREE.Color(0x11131f);
                    scene.fog = new THREE.FogExp2(0x11131f, 0.002);

                    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                    camera.position.set(0, 2, 10);

                    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                    renderer.shadowMap.enabled = true;
                    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                    document.body.appendChild(renderer.domElement);

                    const labelRenderer = new THREE.CSS2DRenderer();
                    labelRenderer.setSize(window.innerWidth, window.innerHeight);
                    labelRenderer.domElement.style.position = 'absolute';
                    labelRenderer.domElement.style.top = '0px';
                    labelRenderer.domElement.style.left = '0px';
                    labelRenderer.domElement.style.pointerEvents = 'none';
                    document.body.appendChild(labelRenderer.domElement);

                    const controls = new THREE.PointerLockControls(camera, document.body);
                    scene.add(controls.getObject());

                    renderer.domElement.addEventListener('click', () => {
                        if (!controls.isLocked) controls.lock();
                    });
                    controls.addEventListener('lock', () => {
                        tutorialDiv.style.opacity = '0';
                        setTimeout(() => tutorialDiv.style.display = 'none', 1000);
                    });

                    // --- Lighting ---
                    const ambient = new THREE.AmbientLight(0x404060);
                    scene.add(ambient);

                    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
                    dirLight.position.set(5, 10, 7);
                    dirLight.castShadow = true;
                    dirLight.shadow.mapSize.width = 1024;
                    dirLight.shadow.mapSize.height = 1024;
                    const d = 15;
                    dirLight.shadow.camera.left = -d;
                    dirLight.shadow.camera.right = d;
                    dirLight.shadow.camera.top = d;
                    dirLight.shadow.camera.bottom = -d;
                    dirLight.shadow.camera.near = 1;
                    dirLight.shadow.camera.far = 25;
                    scene.add(dirLight);

                    const fillLight = new THREE.PointLight(0x446688, 0.5);
                    fillLight.position.set(-3, 2, 4);
                    scene.add(fillLight);

                    // --- Hub and Doors (same as before) ---
                    const hubGroup = new THREE.Group();

                    // Central platform
                    const platformGeo = new THREE.CylinderGeometry(4, 4, 0.5, 32);
                    const platformMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.7, metalness: 0.2 });
                    const platform = new THREE.Mesh(platformGeo, platformMat);
                    platform.position.y = -0.25;
                    platform.receiveShadow = true;
                    platform.castShadow = true;
                    hubGroup.add(platform);

                    // Door positions
                    const doorPositions = [
                        { angle: 0, radius: 7, type: 'skills', label: 'SKILLS' },
                        { angle: Math.PI/2, radius: 7, type: 'projects', label: 'PROJECTS' },
                        { angle: Math.PI, radius: 7, type: 'experience', label: 'EXPERIENCE' },
                        { angle: 3*Math.PI/2, radius: 7, type: 'contact', label: 'CONTACT' }
                    ];

                    function createDoor(color, label) {
                        const doorGroup = new THREE.Group();

                        const frameMat = new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.4 });
                        const leftPost = new THREE.Mesh(new THREE.BoxGeometry(0.3, 2.2, 0.3), frameMat);
                        leftPost.position.set(-1, 1.1, 0);
                        doorGroup.add(leftPost);
                        const rightPost = new THREE.Mesh(new THREE.BoxGeometry(0.3, 2.2, 0.3), frameMat);
                        rightPost.position.set(1, 1.1, 0);
                        doorGroup.add(rightPost);
                        const topBeam = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.3, 0.3), frameMat);
                        topBeam.position.set(0, 2.2, 0);
                        doorGroup.add(topBeam);

                        const doorMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6 });
                        const doorLeaf = new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.0, 0.2), doorMat);
                        doorLeaf.position.set(0, 1.0, 0.1);
                        doorLeaf.castShadow = true;
                        doorLeaf.receiveShadow = true;
                        doorGroup.add(doorLeaf);

                        const handleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.8 });
                        const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.4, 8), handleMat);
                        handle.rotation.z = Math.PI/2;
                        handle.position.set(0.6, 1.0, 0.3);
                        doorGroup.add(handle);

                        // Label (CSS2D) above door
                        const labelDiv = document.createElement('div');
                        labelDiv.style.color = 'white';
                        labelDiv.style.background = 'rgba(30,30,40,0.9)';
                        labelDiv.style.padding = '4px 12px';
                        labelDiv.style.borderRadius = '20px';
                        labelDiv.style.border = '1px solid #888';
                        labelDiv.style.fontSize = '14px';
                        labelDiv.style.fontWeight = 'bold';
                        labelDiv.style.backdropFilter = 'blur(4px)';
                        labelDiv.innerText = label;
                        const labelObj = new THREE.CSS2DObject(labelDiv);
                        labelObj.position.set(0, 3.0, 0);
                        doorGroup.add(labelObj);

                        return doorGroup;
                    }

                    // Build islands and doors
                    doorPositions.forEach(pos => {
                        const islandBase = new THREE.Mesh(
                            new THREE.CylinderGeometry(2.5, 3, 0.8, 16),
                            new THREE.MeshStandardMaterial({ color: 0x3a4a5a, roughness: 0.6 })
                        );
                        islandBase.position.set(Math.cos(pos.angle)*pos.radius, -0.4, Math.sin(pos.angle)*pos.radius);
                        islandBase.receiveShadow = true;
                        islandBase.castShadow = true;
                        scene.add(islandBase);

                        const doorColor = pos.type === 'skills' ? '#FFD700' : pos.type === 'projects' ? '#00FF7F' : pos.type === 'experience' ? '#5a9eff' : '#ffaa00';
                        const door = createDoor(doorColor, pos.label);
                        door.position.set(Math.cos(pos.angle)*pos.radius, 0.5, Math.sin(pos.angle)*pos.radius);
                        door.rotation.y = -pos.angle;
                        scene.add(door);
                        door.userData = { type: 'door', room: pos.type };
                    });

                    // Decorative pillars on central platform
                    for (let i = 0; i < 8; i++) {
                        const angle = (i/8)*Math.PI*2;
                        const radius = 3.5;
                        const pillarGeo = new THREE.CylinderGeometry(0.3, 0.4, 2, 8);
                        const pillarMat = new THREE.MeshStandardMaterial({ color: 0x6a7a8a });
                        const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                        pillar.position.set(Math.cos(angle)*radius, 1, Math.sin(angle)*radius);
                        pillar.castShadow = true;
                        pillar.receiveShadow = true;
                        scene.add(pillar);
                    }

                    scene.add(hubGroup);

                    // --- Rooms (initially invisible) ---
                    const rooms = {
                        skills: new THREE.Group(),
                        projects: new THREE.Group(),
                        experience: new THREE.Group(),
                        contact: new THREE.Group()
                    };

                    // Skills Room
                    const skillsRoom = rooms.skills;
                    const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.8 });
                    const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), floorMat);
                    floor.rotation.x = -Math.PI/2;
                    floor.position.y = 0;
                    floor.receiveShadow = true;
                    skillsRoom.add(floor);
                    const wallMat = new THREE.MeshStandardMaterial({ color: 0x3a3a4a });
                    const backWall = new THREE.Mesh(new THREE.BoxGeometry(10, 4, 0.5), wallMat);
                    backWall.position.set(0, 2, -5);
                    backWall.castShadow = true;
                    backWall.receiveShadow = true;
                    skillsRoom.add(backWall);
                    const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 4, 10), wallMat);
                    leftWall.position.set(-5, 2, 0);
                    leftWall.castShadow = true;
                    leftWall.receiveShadow = true;
                    skillsRoom.add(leftWall);
                    const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 4, 10), wallMat);
                    rightWall.position.set(5, 2, 0);
                    rightWall.castShadow = true;
                    rightWall.receiveShadow = true;
                    skillsRoom.add(rightWall);

                    // Place skill panels using Widgets
                    PORTFOLIO_DATA.skills.forEach((skill, i) => {
                        const panel = window.Widgets.createSkillPanel(skill, i);
                        panel.position.set(-4 + i*2, 2.5, -4.5);
                        skillsRoom.add(panel);
                    });

                    // Projects Room
                    const projectsRoom = rooms.projects;
                    const pFloor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), floorMat);
                    pFloor.rotation.x = -Math.PI/2;
                    pFloor.position.y = 0;
                    pFloor.receiveShadow = true;
                    projectsRoom.add(pFloor);
                    const pBack = new THREE.Mesh(new THREE.BoxGeometry(10, 4, 0.5), wallMat);
                    pBack.position.set(0, 2, -5);
                    pBack.castShadow = true;
                    projectsRoom.add(pBack);
                    PORTFOLIO_DATA.projects.forEach((proj, i) => {
                        const panel = window.Widgets.createProjectPanel(proj, i);
                        panel.position.set(-2 + i*4, 2.5, -4.5);
                        projectsRoom.add(panel);
                    });

                    // Experience Room
                    const expRoom = rooms.experience;
                    const eFloor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), floorMat);
                    eFloor.rotation.x = -Math.PI/2;
                    eFloor.position.y = 0;
                    eFloor.receiveShadow = true;
                    expRoom.add(eFloor);
                    const eBack = new THREE.Mesh(new THREE.BoxGeometry(10, 4, 0.5), wallMat);
                    eBack.position.set(0, 2, -5);
                    eBack.castShadow = true;
                    expRoom.add(eBack);
                    PORTFOLIO_DATA.experience.forEach((exp, i) => {
                        const panel = window.Widgets.createExperiencePanel(exp, i);
                        panel.position.set(-3 + i*6, 2.5, -4.5);
                        expRoom.add(panel);
                    });

                    // Contact Room
                    const contactRoom = rooms.contact;
                    const cFloor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), floorMat);
                    cFloor.rotation.x = -Math.PI/2;
                    cFloor.position.y = 0;
                    cFloor.receiveShadow = true;
                    contactRoom.add(cFloor);
                    const cBack = new THREE.Mesh(new THREE.BoxGeometry(10, 4, 0.5), wallMat);
                    cBack.position.set(0, 2, -5);
                    cBack.castShadow = true;
                    contactRoom.add(cBack);
                    const contactPanel = window.Widgets.createContactPanel();
                    contactPanel.position.set(0, 2.5, -4.5);
                    contactRoom.add(contactPanel);

                    // Hide all rooms initially
                    for (let key in rooms) {
                        rooms[key].visible = false;
                        scene.add(rooms[key]);
                    }

                    // --- Particles ---
                    const particleCount = 800;
                    const particlesGeo = new THREE.BufferGeometry();
                    const particlesPos = new Float32Array(particleCount * 3);
                    for (let i = 0; i < particleCount; i++) {
                        particlesPos[i*3] = (Math.random() - 0.5) * 60;
                        particlesPos[i*3+1] = (Math.random() - 0.5) * 30;
                        particlesPos[i*3+2] = (Math.random() - 0.5) * 60;
                    }
                    particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlesPos, 3));
                    const particlesMat = new THREE.PointsMaterial({ color: 0x99aacc, size: 0.1, transparent: true, opacity: 0.3 });
                    const particles = new THREE.Points(particlesGeo, particlesMat);
                    scene.add(particles);

                    // --- Raycaster for door clicks ---
                    const raycaster = new THREE.Raycaster();
                    const mouse = new THREE.Vector2();

                    function onClick(event) {
                        if (!controls.isLocked) return;

                        const rect = renderer.domElement.getBoundingClientRect();
                        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

                        raycaster.setFromCamera(mouse, camera);
                        const intersects = raycaster.intersectObjects(scene.children, true);

                        for (let hit of intersects) {
                            let obj = hit.object;
                            while (obj) {
                                if (obj.userData && obj.userData.type === 'door') {
                                    const roomType = obj.userData.room;
                                    hubGroup.visible = false;
                                    for (let key in rooms) {
                                        rooms[key].visible = (key === roomType);
                                    }
                                    // Position player inside room
                                    controls.getObject().position.set(0, 2, 3);
                                    controls.getObject().lookAt(0, 2, 0);
                                    infoDiv.innerText = `📍 In ${roomType.toUpperCase()} room · Click door to return (not yet implemented)`;
                                    return;
                                }
                                obj = obj.parent;
                            }
                        }
                    }

                    renderer.domElement.addEventListener('click', onClick);
                    renderer.domElement.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        if (controls.isLocked) {
                            const touch = e.touches[0];
                            onClick({ clientX: touch.clientX, clientY: touch.clientY });
                        }
                    });

                    // --- Movement (camera-relative) ---
                    const moveState = { forward: false, backward: false, left: false, right: false };
                    document.addEventListener('keydown', (e) => {
                        switch(e.code) {
                            case 'KeyW': moveState.forward = true; break;
                            case 'KeyS': moveState.backward = true; break;
                            case 'KeyA': moveState.left = true; break;
                            case 'KeyD': moveState.right = true; break;
                        }
                    });
                    document.addEventListener('keyup', (e) => {
                        switch(e.code) {
                            case 'KeyW': moveState.forward = false; break;
                            case 'KeyS': moveState.backward = false; break;
                            case 'KeyA': moveState.left = false; break;
                            case 'KeyD': moveState.right = false; break;
                        }
                    });

                    function updateMovement(delta) {
                        if (!controls.isLocked) return;
                        const speed = 5 * delta;
                        const cameraDir = new THREE.Vector3();
                        camera.getWorldDirection(cameraDir);
                        cameraDir.y = 0;
                        cameraDir.normalize();
                        const strafeDir = new THREE.Vector3().crossVectors(cameraDir, new THREE.Vector3(0,1,0)).normalize();

                        if (moveState.forward) controls.getObject().position.addScaledVector(cameraDir, speed);
                        if (moveState.backward) controls.getObject().position.addScaledVector(cameraDir, -speed);
                        if (moveState.left) controls.getObject().position.addScaledVector(strafeDir, -speed);
                        if (moveState.right) controls.getObject().position.addScaledVector(strafeDir, speed);

                        if (joystickActive) {
                            const joyX = joystickVector.x;
                            const joyY = joystickVector.y;
                            if (Math.abs(joyX) > 0.1 || Math.abs(joyY) > 0.1) {
                                controls.getObject().position.addScaledVector(strafeDir, joyX * speed * 1.5);
                                controls.getObject().position.addScaledVector(cameraDir, -joyY * speed * 1.5);
                            }
                        }
                    }

                    // --- Animation loop ---
                    function animate() {
                        requestAnimationFrame(animate);
                        const delta = Math.min(clock.getDelta(), 0.1);
                        updateFPS();

                        particles.rotation.y += 0.0002;

                        updateMovement(delta);

                        renderer.render(scene, camera);
                        labelRenderer.render(scene, camera);
                    }

                    const clock = new THREE.Clock();
                    animate();

                    // --- Resize ---
                    window.addEventListener('resize', () => {
                        camera.aspect = window.innerWidth / window.innerHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(window.innerWidth, window.innerHeight);
                        labelRenderer.setSize(window.innerWidth, window.innerHeight);
                    });

                } catch (e) {
                    showError("3D init failed: " + e.message);
                }
            }
        })();
    </script>
</body>
</html>
