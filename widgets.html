<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Widgets </title>
    <style>
        /* Base widget styles – shared by all panels */
        .widget {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: rgba(15, 20, 30, 0.75);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(90, 158, 255, 0.3);
            border-radius: 24px;
            padding: 24px;
            color: #fff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(90, 158, 255, 0.1) inset;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1), box-shadow 0.3s ease, border-color 0.2s;
            max-width: 320px;
            pointer-events: auto;
            transform: translateZ(0); /* force GPU layer */
            will-change: transform, box-shadow, border-color;
            animation: widget-appear 0.5s ease-out;
        }
        .widget:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(90, 158, 255, 0.6) inset;
            border-color: #5a9eff;
        }

        @keyframes widget-appear {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .widget-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 10px rgba(90, 158, 255, 0.3);
        }
        .widget-subtitle {
            font-size: 0.9rem;
            color: #aaccff;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(90, 158, 255, 0.3);
            padding-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .widget-content {
            font-size: 0.95rem;
            color: #ddd;
            line-height: 1.6;
        }

        /* Skill bars */
        .skill-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            margin: 12px 0;
            overflow: hidden;
            position: relative;
        }
        .skill-fill {
            height: 100%;
            border-radius: 12px;
            background: linear-gradient(90deg, #5a9eff, #aaccff);
            box-shadow: 0 0 15px #5a9eff;
            width: 0%; /* set inline */
            transition: width 1s ease-out;
            animation: skill-pulse 2s infinite;
        }
        @keyframes skill-pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        /* Tags */
        .tag {
            display: inline-block;
            background: rgba(90, 158, 255, 0.15);
            border: 1px solid rgba(90, 158, 255, 0.4);
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.8rem;
            margin-right: 6px;
            margin-bottom: 6px;
            color: #aaccff;
            transition: 0.2s;
        }
        .tag:hover {
            background: rgba(90, 158, 255, 0.3);
            border-color: #5a9eff;
            transform: scale(1.05);
        }

        /* Buttons */
        .widget-button {
            display: inline-block;
            background: transparent;
            border: 1px solid #5a9eff;
            color: #5a9eff;
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 12px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(90,158,255,0.2);
        }
        .widget-button:hover {
            background: #5a9eff;
            color: #000;
            box-shadow: 0 0 20px #5a9eff;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #5a9eff, transparent);
            margin: 16px 0;
        }

        /* Stat display */
        .stat-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .stat-item {
            text-align: center;
            flex: 1;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #5a9eff;
            text-shadow: 0 0 15px #5a9eff;
            line-height: 1;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Chart bar (for visual flair) */
        .chart {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 50px;
            margin: 16px 0;
        }
        .bar {
            width: 8px;
            background: linear-gradient(180deg, #5a9eff, #2a4a8a);
            border-radius: 4px 4px 0 0;
            transition: height 0.3s;
            box-shadow: 0 0 8px #5a9eff;
        }

        /* Icon */
        .widget-icon {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px #5a9eff);
        }
    </style>
</head>
<body>
    <script>
        (function() {
            "use strict";

            // Ensure THREE is available (will be loaded before this script)
            if (typeof THREE === 'undefined') {
                console.error('THREE not found. Widgets cannot create CSS2DObjects.');
                window.Widgets = null;
                return;
            }

            // Helper to create a CSS2DObject from an HTML string with given class
            function createPanel(htmlContent, additionalClass = '') {
                try {
                    const div = document.createElement('div');
                    div.className = 'widget' + (additionalClass ? ' ' + additionalClass : '');
                    div.innerHTML = htmlContent;
                    return new THREE.CSS2DObject(div);
                } catch (e) {
                    console.error('Failed to create CSS2DObject:', e);
                    // Return a simple fallback div
                    const fallbackDiv = document.createElement('div');
                    fallbackDiv.style.cssText = 'color:white; background:black; padding:10px;';
                    fallbackDiv.innerText = 'Widget error';
                    return new THREE.CSS2DObject(fallbackDiv);
                }
            }

            // Random chart data for variety
            function randomChart() {
                return [30, 70, 50, 90, 40, 60, 80].map(v => v * Math.random()).map(h => Math.floor(h));
            }

            // Expose the Widgets factory
            window.Widgets = {
                /**
                 * Create a skill panel.
                 * @param {Object} skill - { name, level, color, description }
                 * @param {number} index - for ordering
                 * @returns {THREE.CSS2DObject}
                 */
                createSkillPanel: function(skill, index) {
                    try {
                        const chartBars = randomChart().map(h => `<div class="bar" style="height:${h}%"></div>`).join('');
                        const html = `
                            <div class="widget-icon" style="color: ${skill.color || '#5a9eff'};">⚡</div>
                            <div class="widget-title" style="color: ${skill.color || '#fff'};">${skill.name}</div>
                            <div class="widget-subtitle">SKILL #${index+1}</div>
                            <div class="widget-content">${skill.description || 'No description'}</div>
                            <div class="chart">${chartBars}</div>
                            <div class="skill-bar">
                                <div class="skill-fill" style="width:${skill.level || 0}%; background: ${skill.color || '#5a9eff'};"></div>
                            </div>
                            <div style="display: flex; justify-content: space-between; color: #ccc; font-size:0.9rem;">
                                <span>Proficiency</span><span>${skill.level || 0}%</span>
                            </div>
                        `;
                        return createPanel(html);
                    } catch (e) {
                        console.error('createSkillPanel error:', e);
                        return createPanel('<div>Skill panel error</div>');
                    }
                },

                /**
                 * Create a project panel.
                 * @param {Object} proj - { title, description, link, color, tags }
                 * @param {number} index
                 * @returns {THREE.CSS2DObject}
                 */
                createProjectPanel: function(proj, index) {
                    try {
                        const tagsHtml = (proj.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
                        const linkHtml = proj.link && proj.link !== '#' 
                            ? `<a href="${proj.link}" target="_blank" class="widget-button">🚀 VIEW PROJECT</a>`
                            : '<span style="color:#888;">🔒 Coming soon</span>';
                        const html = `
                            <div class="widget-icon" style="color: ${proj.color || '#5a9eff'};">📁</div>
                            <div class="widget-title" style="color: ${proj.color || '#fff'};">${proj.title}</div>
                            <div class="widget-subtitle">PROJECT #${index+1}</div>
                            <div class="widget-content">${proj.description || ''}</div>
                            <div style="margin: 16px 0;">${tagsHtml}</div>
                            ${linkHtml}
                        `;
                        return createPanel(html);
                    } catch (e) {
                        console.error('createProjectPanel error:', e);
                        return createPanel('<div>Project panel error</div>');
                    }
                },

                /**
                 * Create an experience panel.
                 * @param {Object} exp - { company, role, period, description }
                 * @param {number} index
                 * @returns {THREE.CSS2DObject}
                 */
                createExperiencePanel: function(exp, index) {
                    try {
                        const html = `
                            <div class="widget-icon">💼</div>
                            <div class="widget-title">${exp.company || ''}</div>
                            <div class="widget-subtitle">${exp.role || ''}</div>
                            <div style="color: #5a9eff; font-size:0.85rem; margin-bottom:12px;">${exp.period || ''}</div>
                            <div class="widget-content">${exp.description || ''}</div>
                            <div class="divider"></div>
                            <div class="stat-grid">
                                <div class="stat-item">
                                    <div class="stat-value">${Math.floor(Math.random()*3+2)}</div>
                                    <div class="stat-label">years</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value">${Math.floor(Math.random()*10+5)}</div>
                                    <div class="stat-label">projects</div>
                                </div>
                            </div>
                        `;
                        return createPanel(html);
                    } catch (e) {
                        console.error('createExperiencePanel error:', e);
                        return createPanel('<div>Experience panel error</div>');
                    }
                },

                /**
                 * Create a contact panel.
                 * @param {Object} socials - { linkedin, github, email? }
                 * @returns {THREE.CSS2DObject}
                 */
                createContactPanel: function(socials) {
                    try {
                        const linkedinLink = socials.linkedin ? `<a href="${socials.linkedin}" target="_blank" class="widget-button">LinkedIn</a>` : '';
                        const githubLink = socials.github ? `<a href="${socials.github}" target="_blank" class="widget-button">GitHub</a>` : '';
                        const html = `
                            <div class="widget-icon">📬</div>
                            <div class="widget-title">CONNECT</div>
                            <div class="divider"></div>
                            <div style="display: flex; justify-content: center; gap: 10px; margin: 16px 0;">
                                ${linkedinLink}
                                ${githubLink}
                            </div>
                            <div style="color:#aaa; font-size:0.85rem; text-align:center;">Direct messages open</div>
                        `;
                        return createPanel(html);
                    } catch (e) {
                        console.error('createContactPanel error:', e);
                        return createPanel('<div>Contact panel error</div>');
                    }
                },

                /**
                 * Create a generic info panel with custom content.
                 * @param {string} title
                 * @param {string} content
                 * @param {string} icon (emoji or HTML)
                 * @returns {THREE.CSS2DObject}
                 */
                createInfoPanel: function(title, content, icon = 'ℹ️') {
                    try {
                        const html = `
                            <div class="widget-icon">${icon}</div>
                            <div class="widget-title">${title}</div>
                            <div class="divider"></div>
                            <div class="widget-content">${content}</div>
                        `;
                        return createPanel(html);
                    } catch (e) {
                        console.error('createInfoPanel error:', e);
                        return createPanel('<div>Info panel error</div>');
                    }
                },

                /**
                 * Create a statistics panel with multiple stats.
                 * @param {Array} stats - [{ label, value }]
                 * @returns {THREE.CSS2DObject}
                 */
                createStatsPanel: function(stats) {
                    try {
                        const items = stats.map(s => `
                            <div class="stat-item">
                                <div class="stat-value">${s.value}</div>
                                <div class="stat-label">${s.label}</div>
                            </div>
                        `).join('');
                        const html = `
                            <div class="widget-icon">📊</div>
                            <div class="widget-title">STATISTICS</div>
                            <div class="divider"></div>
                            <div class="stat-grid">${items}</div>
                        `;
                        return createPanel(html);
                    } catch (e) {
                        console.error('createStatsPanel error:', e);
                        return createPanel('<div>Stats panel error</div>');
                    }
                },

                /**
                 * Create a custom widget from raw HTML (advanced use).
                 * @param {string} html
                 * @returns {THREE.CSS2DObject}
                 */
                createCustomWidget: function(html) {
                    try {
                        return createPanel(html);
                    } catch (e) {
                        console.error('createCustomWidget error:', e);
                        return createPanel('<div>Custom widget error</div>');
                    }
                }
            };
        })();
    </script>
</body>
</html>
