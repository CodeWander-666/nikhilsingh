<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Premium Widgets</title>
    <style>
        /* Global widget styles – used inside each panel */
        .widget-panel {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: rgba(30, 35, 45, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            color: #fff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            width: 280px;
            transition: transform 0.2s, box-shadow 0.2s;
            line-height: 1.5;
        }
        .widget-panel:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
        }
        .widget-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }
        .widget-subtitle {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .widget-content {
            font-size: 0.95rem;
            color: #ddd;
        }
        .skill-bar {
            height: 6px;
            background: #2a2a3a;
            border-radius: 3px;
            margin: 12px 0;
            overflow: hidden;
        }
        .skill-fill {
            height: 100%;
            border-radius: 3px;
        }
        .tag {
            display: inline-block;
            background: rgba(90, 158, 255, 0.2);
            border: 1px solid rgba(90, 158, 255, 0.3);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.8rem;
            margin-right: 6px;
            margin-bottom: 6px;
            color: #5a9eff;
        }
        .link-button {
            display: inline-block;
            background: transparent;
            border: 1px solid #5a9eff;
            color: #5a9eff;
            padding: 8px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
            margin-top: 12px;
        }
        .link-button:hover {
            background: #5a9eff;
            color: #000;
        }
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <script>
        (function() {
            "use strict";
            // Ensure THREE is available (it should be, as widgets are loaded after Three)
            if (typeof THREE === 'undefined') {
                console.error('THREE not found. Widgets cannot create CSS2DObjects.');
                window.Widgets = null;
                return;
            }

            // Helper to create a CSS2DObject from a div
            function createPanel(htmlContent, additionalClass = '') {
                const div = document.createElement('div');
                div.className = 'widget-panel' + (additionalClass ? ' ' + additionalClass : '');
                div.innerHTML = htmlContent;
                return new THREE.CSS2DObject(div);
            }

            // Expose Widgets factory
            window.Widgets = {
                // Skill panel
                createSkillPanel: function(skill, index) {
                    const html = `
                        <div class="widget-title" style="color: ${skill.color};">${skill.name}</div>
                        <div class="widget-subtitle">SKILL #${index+1}</div>
                        <div class="widget-content">${skill.description}</div>
                        <div class="skill-bar">
                            <div class="skill-fill" style="width: ${skill.level}%; background: ${skill.color};"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; color: #ccc; font-size:0.9rem;">
                            <span>Proficiency</span><span>${skill.level}%</span>
                        </div>
                    `;
                    return createPanel(html);
                },

                // Project panel
                createProjectPanel: function(proj, index) {
                    const tagsHtml = proj.tags.map(t => `<span class="tag">${t}</span>`).join('');
                    const linkHtml = proj.link && proj.link !== '#' 
                        ? `<a href="${proj.link}" target="_blank" class="link-button">VIEW PROJECT</a>`
                        : '';
                    const html = `
                        <div class="widget-title" style="color: ${proj.color};">${proj.title}</div>
                        <div class="widget-subtitle">PROJECT #${index+1}</div>
                        <div class="widget-content">${proj.description}</div>
                        <div style="margin: 16px 0;">${tagsHtml}</div>
                        ${linkHtml}
                    `;
                    return createPanel(html);
                },

                // Experience panel
                createExperiencePanel: function(exp, index) {
                    const html = `
                        <div class="widget-title" style="color: #ddd;">${exp.company}</div>
                        <div class="widget-subtitle">${exp.role}</div>
                        <div style="color: #5a9eff; font-size:0.85rem; margin-bottom:12px;">${exp.period}</div>
                        <div class="widget-content">${exp.description}</div>
                    `;
                    return createPanel(html);
                },

                // Contact panel
                createContactPanel: function() {
                    const html = `
                        <div style="text-align: center;">
                            <div style="font-size:3rem; margin-bottom:16px;">📬</div>
                            <div class="widget-title" style="color:#ffaa00;">CONNECT</div>
                            <div class="divider"></div>
                            <div style="margin: 16px 0;">
                                <a href="https://linkedin.com/in/nikhil-singh" target="_blank" class="link-button" style="margin-right:8px;">LinkedIn</a>
                                <a href="https://github.com/wander-666" target="_blank" class="link-button">GitHub</a>
                            </div>
                            <div style="color:#aaa; font-size:0.85rem;">Direct messages open</div>
                        </div>
                    `;
                    return createPanel(html);
                },

                // Generic knowledge fragment (if needed, but not used in current index)
                createKnowledgeFragment: function(id) {
                    const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4'];
                    const color = colors[id % colors.length];
                    const html = `
                        <div style="text-align: center;">
                            <div style="font-size:2rem; margin-bottom:8px;">🧬</div>
                            <div class="widget-title" style="color:${color};">NODE #${id}</div>
                            <div class="skill-bar"><div class="skill-fill" style="width:${Math.floor(Math.random()*100)}%; background:${color};"></div></div>
                        </div>
                    `;
                    return createPanel(html);
                }
            };
        })();
    </script>
</body>
</html>
