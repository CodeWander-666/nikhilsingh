<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Experience Room</title>
    <style>
        .exp-panel {
            font-family: 'Inter', sans-serif;
            background: rgba(20,25,35,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #5a9eff;
            border-radius: 16px;
            padding: 24px;
            color: white;
            width: 300px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: 0.2s;
        }
        .exp-panel:hover {
            border-color: #5a9eff;
            box-shadow: 0 30px 50px rgba(0,0,0,0.8), 0 0 20px #5a9eff;
        }
        .exp-company {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ddd;
            margin-bottom: 4px;
        }
        .exp-role {
            font-size: 1.2rem;
            color: #5a9eff;
            margin-bottom: 4px;
        }
        .exp-period {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .exp-desc {
            color: #ccc;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<!-- ROOM_CONTENT -->
<div class="exp-panel">
    <div class="exp-company">ALMABETTER</div>
    <div class="exp-role">Data Analyst Apprentice</div>
    <div class="exp-period">2025 – Present</div>
    <div class="exp-desc">Full Stack Data Science & AI program. Python, data types, complex datasets.</div>
</div>
<div class="exp-panel">
    <div class="exp-company">SG GURUKUL</div>
    <div class="exp-role">Sales & Marketing Intern</div>
    <div class="exp-period">Aug 2023 – Oct 2023</div>
    <div class="exp-desc">Lead generation, outbound telesales, education counseling.</div>
</div>
<!-- /ROOM_CONTENT -->
</body>
</html>
